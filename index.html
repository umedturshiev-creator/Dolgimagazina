<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.header {background:#000;color:white;padding:15px;text-align:center;}
.container {padding:15px;max-width:500px;margin:auto;}
.card {background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.summary {font-size:14px;line-height:1.6;}
.overdue {background:#ffe6e6;color:#c40000;padding:10px;border-radius:10px;margin-bottom:10px;}
button {width:100%;padding:10px;border:none;border-radius:8px;background:#28a745;color:white;margin-top:8px;}
button:disabled {opacity:0.5;}
input {width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
.small {font-size:12px;color:#666;}
</style>
</head>

<body>

<div class="header">
  <div>Fashion&StyleLife - Долги</div>
  <div class="small" id="versionBox">v4.5</div>
</div>

<div class="container">

<div class="card summary" id="summaryBox">Загрузка...</div>
<div class="overdue" id="overdueBox"></div>

<h3>Добавить долг</h3>

<input type="text" id="client" placeholder="Имя клиента">
<input type="text" id="phone" placeholder="Телефон (9 цифр)"
maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input type="number" id="amount" placeholder="Сумма"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<label class="small">Выберите дату возврата</label>
<input type="date" id="dueDate">

<button id="saveBtn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyYQaX9Ei_oeDnRjw0JgQa7iJQUKObv258i-IxexKxoD1TF0lAAc3eCoHedJ1DI0BO5Q/exec";

const client = document.getElementById("client");
const phone = document.getElementById("phone");
const amount = document.getElementById("amount");
const dueDate = document.getElementById("dueDate");
const saveBtn = document.getElementById("saveBtn");

[client, phone, amount, dueDate].forEach(el => {
  el.addEventListener("input", checkForm);
});

function checkForm() {
  saveBtn.disabled = !(client.value && phone.value.length===9 && amount.value && dueDate.value);
}

function loadDebts() {

  fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {

    document.getElementById("versionBox").innerText = "v" + data.version;

    document.getElementById("summaryBox").innerHTML =
      "💰 Всего долгов: " + data.allTotal + " сомони<br>" +
      "🟢 Активные: " + data.activeTotal + " (" + data.activeCount + ")<br>" +
      "🔵 Оплаченные: " + data.paidTotal + " (" + data.paidCount + ")";

    document.getElementById("overdueBox").innerHTML =
      "🔴 Просрочено: " + data.overdueCount +
      " на сумму " + data.overdueTotal + " сомони";

    let html = "";

    data.debts.forEach(d => {
      html += `
      <div class="card" style="${d.overdue ? 'border-left:5px solid red' : ''}">
        <b>${d.client}</b><br>
        Телефон: ${d.phone}<br>
        Сумма: ${d.amount} сомони<br>
        <button onclick="markPaid(${d.row})">Оплачено</button>
      </div>`;
    });

    document.getElementById("debtList").innerHTML = html;
  });
}

function addDebt() {

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      client: client.value,
      phone: phone.value,
      amount: amount.value,
      dueDate: dueDate.value
    })
  })
  .then(() => {
    client.value="";
    phone.value="";
    amount.value="";
    dueDate.value="";
    saveBtn.disabled=true;
    loadDebts();
  });
}

function markPaid(row) {

  if (!confirm("Подтвердить оплату долга?")) return;

  fetch(SCRIPT_URL + "?paid=" + row)
  .then(() => loadDebts());
}

loadDebts();

</script>

</body>
</html>
