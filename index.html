<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мини CRM — Долги</title>

<style>
body {margin:0;font-family:Arial;background:#f2f4f8;}
.header {background:#2b7cff;color:white;padding:20px;text-align:center;font-size:20px;font-weight:bold;}
.container {padding:15px;max-width:600px;margin:auto;}
.card {background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.total {background:white;padding:15px;border-radius:12px;margin-bottom:15px;font-weight:bold;font-size:18px;text-align:center;}
button {padding:8px 12px;border:none;border-radius:8px;background:#28a745;color:white;cursor:pointer;}
input {width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
</style>
</head>

<body>

<div class="header">Мини CRM — Долги</div>

<div class="container">

<div class="total" id="totalBox">Загрузка...</div>

<h3>Добавить долг</h3>

<input type="text" id="client" placeholder="Имя клиента">
<input type="text" id="phone" placeholder="Телефон">
<input type="number" id="amount" placeholder="Сумма">
<input type="date" id="dueDate">
<button onclick="addDebt()">Сохранить</button>

<h3 style="margin-top:25px;">Список должников</h3>

<div id="debtList"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZ5Ofr9B16ouLDKcv7jqB_QwC-2pXi7Q0zyOrn817sD2PxXlEJKutOcXPlFaAlpS3KTQ/exec";

function loadDebts() {

  fetch(SCRIPT_URL)
  .then(response => response.json())
  .then(data => {

    document.getElementById("totalBox").innerHTML =
      "Общая сумма: " + data.total + " сомони";

    let html = "";

    data.debts.forEach(d => {

      html += `
      <div class="card">
        <b>${d.client}</b><br>
        Телефон: ${String(d.phone)}<br>
        Сумма: ${d.amount} сомони<br>
        <button onclick="markPaid(${d.row})">Оплачено</button>
      </div>
      `;
    });

    document.getElementById("debtList").innerHTML = html;

  })
  .catch(err => {
    document.getElementById("totalBox").innerHTML = "Ошибка загрузки";
    console.error(err);
  });
}

function addDebt() {

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      client: document.getElementById("client").value,
      phone: document.getElementById("phone").value,
      amount: document.getElementById("amount").value,
      dueDate: document.getElementById("dueDate").value
    })
  })
  .then(() => {
    loadDebts();
    document.getElementById("client").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("dueDate").value = "";
  });
}

function markPaid(row) {

  fetch(SCRIPT_URL + "?paid=" + row)
  .then(() => loadDebts());
}

loadDebts();

</script>

</body>
</html>
