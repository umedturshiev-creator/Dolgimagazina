<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.header{background:#000;color:white;text-align:center;padding:15px;}
.container{max-width:500px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#28a745;color:white;margin-top:8px;font-weight:bold;}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
.login{
position:fixed;inset:0;background:#000;color:white;
display:flex;flex-direction:column;justify-content:center;align-items:center;
z-index:9999;padding:20px;text-align:center;
}
.modal{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.6);display:none;
align-items:center;justify-content:center;
}
.modal-content{
background:white;padding:20px;border-radius:12px;
width:90%;max-width:350px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login">
<h2>Вход в систему</h2>
<input type="password" id="pinInput" placeholder="Введите PIN">
<button onclick="login()">Войти</button>
</div>

<div class="header">
<h2>Fashion&StyleLife - Долги</h2>
<div id="sellerName"></div>
</div>

<div class="container" id="appContent" style="display:none;">

<div id="statsBox" class="card">Загрузка...</div>

<h3>Добавить долг</h3>
<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон (9 цифр)" maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="number" placeholder="Сумма">
<input id="dueDate" type="date">
<button onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Введите сумму оплаты</h3>
<input type="number" id="partialAmount">
<button onclick="confirmPayment()">Подтвердить</button>
</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3oJLbR_AXnG--locXoD0N6gLtuoYSrDsg50Q6Odc-_HJylYHExJwWuLvyKtnpFW8V0g/exec";

// PIN → Имя продавца
const USERS = {
"0000":"Тахмина",
"5301":"Мама",
"1602":"Махфират"
};

let currentSeller = null;
let currentRow = null;
let currentRemainder = 0;


// ================= LOGIN =================
function login(){
let pin = document.getElementById("pinInput").value;

if(!USERS[pin]){
alert("Неверный PIN");
return;
}

currentSeller = USERS[pin];
localStorage.setItem("seller", currentSeller);

openApp();
}

function openApp(){
loginScreen.style.display="none";
appContent.style.display="block";
sellerName.innerText="Продавец: "+currentSeller;
loadDebts();
}

// автологин
window.onload = function(){
let saved = localStorage.getItem("seller");
if(saved){
currentSeller = saved;
openApp();
}
};


// ================= CRM =================
function loadDebts(){

fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

statsBox.innerHTML=`
<b>Всего:</b> ${data.allTotal} сомони<br>
<b>Активные:</b> ${data.activeTotal} сомони<br>
<b>Оплаченные:</b> ${data.paidTotal} сомони
`;

let html="";

data.debts.forEach(d=>{
html+=`
<div class="card">
<b>${d.client}</b><br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
Остаток: <b>${d.remainder}</b> сомони
<button onclick="openPayment(${d.row}, ${d.remainder})">
Оплатить
</button>
</div>`;
});

debtList.innerHTML=html;

});
}


function addDebt(){

if(phone.value.length !== 9){
alert("Телефон должен содержать 9 цифр");
return;
}

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
})
.then(()=>{
client.value="";
phone.value="";
amount.value="";
dueDate.value="";
loadDebts();
});
}


function openPayment(row, remainder){
currentRow=row;
currentRemainder=remainder;
paymentModal.style.display="flex";
}


function confirmPayment(){

let pay=Number(partialAmount.value);

if(pay<=0 || pay>currentRemainder){
alert("Неверная сумма");
return;
}

fetch(SCRIPT_URL+"?paid="+currentRow+
"&seller="+currentSeller+
"&amount="+pay)
.then(()=>{
paymentModal.style.display="none";
loadDebts();
});
}

</script>

</body>
</html>
