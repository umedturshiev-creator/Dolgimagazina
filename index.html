<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.header {background:#000;color:white;padding:15px;text-align:center;font-weight:600;}
.container {padding:15px;max-width:500px;margin:auto;}
button {width:100%;padding:12px;border:none;border-radius:10px;font-weight:600;margin-top:10px;cursor:pointer;}
.install-btn {background:#007bff;color:white;}
.login-btn {background:#28a745;color:white;}
.bio-btn {background:#444;color:white;}
.login {
  position:fixed;
  inset:0;
  background:#000;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:20px;
  text-align:center;
}
input {width:100%;padding:12px;border-radius:8px;border:none;margin-top:10px;font-size:16px;}
.lock-screen {
  position:fixed;
  inset:0;
  background:#000;
  color:white;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen" class="login">
  <h2>Вход в систему</h2>
  <input type="password" id="pinInput" placeholder="Введите PIN">
  <button class="login-btn" onclick="login()">Войти</button>
  <button class="bio-btn" onclick="enableBiometric()">🔐 Включить биометрию</button>
</div>

<div id="lockScreen" class="lock-screen">
  <h2>Система заблокирована</h2>
  <button class="login-btn" onclick="unlock()">🔐 Разблокировать</button>
</div>

<div class="header">
  Fashion&StyleLife - Долги
</div>

<div class="container">

<button id="installBtn" class="install-btn" style="display:none;">
  📲 Создать приложение
</button>

<div id="content" style="display:none;margin-top:20px;">
  <h3>CRM активна ✅</h3>
  <p>PWA + Биометрическая защита включены.</p>
</div>

</div>

<script>

// ================= PWA =================
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

// ================= USERS =================
const USERS = {
  "0000": "Тахмина",
  "5301": "Мама",
  "1602": "Махфират"
};

// ================= BIOMETRIC =================
function isBiometricAvailable() {
  return window.PublicKeyCredential !== undefined;
}

async function enableBiometric() {

  if (!isBiometricAvailable()) {
    alert("Биометрия не поддерживается");
    return;
  }

  try {
    const publicKey = {
      challenge: new Uint8Array(32),
      rp: { name: "Fashion&StyleLife" },
      user: {
        id: new Uint8Array(16),
        name: "user",
        displayName: "CRM User"
      },
      pubKeyCredParams: [{ type: "public-key", alg: -7 }],
      authenticatorSelection: {
        authenticatorAttachment: "platform",
        userVerification: "required"
      },
      timeout: 60000,
      attestation: "none"
    };

    await navigator.credentials.create({ publicKey });

    localStorage.setItem("biometricEnabled", "true");
    alert("Биометрия включена");

  } catch (err) {
    alert("Ошибка активации");
  }
}

async function verifyBiometric() {

  if (localStorage.getItem("biometricEnabled") !== "true")
    return false;

  try {
    const publicKey = {
      challenge: new Uint8Array(32),
      timeout: 60000,
      userVerification: "required"
    };

    await navigator.credentials.get({ publicKey });
    return true;

  } catch (err) {
    return false;
  }
}

// ================= LOGIN =================
async function login(){

  const pin = document.getElementById("pinInput").value;

  if (!USERS[pin]) {
    alert("Неверный PIN");
    return;
  }

  localStorage.setItem("seller", USERS[pin]);

  if (localStorage.getItem("biometricEnabled") === "true") {
    const ok = await verifyBiometric();
    if (!ok) {
      alert("Биометрия не подтверждена");
      return;
    }
  }

  openApp();
}

// ================= AUTO LOGIN =================
window.onload = async function(){

  if(localStorage.getItem("seller") &&
     localStorage.getItem("biometricEnabled") === "true"){

     const ok = await verifyBiometric();
     if(ok){
        openApp();
     }
  }
}

// ================= OPEN APP =================
function openApp(){
  loginScreen.style.display="none";
  content.style.display="block";
  resetInactivityTimer();
}

// ================= AUTO LOCK (5 мин) =================
let inactivityTimer;

function resetInactivityTimer(){
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(lockApp, 5 * 60 * 1000);
}

function lockApp(){
  content.style.display="none";
  lockScreen.style.display="flex";
}

async function unlock(){
  const ok = await verifyBiometric();
  if(ok){
    lockScreen.style.display="none";
    content.style.display="block";
    resetInactivityTimer();
  } else {
    alert("Биометрия не подтверждена");
  }
}

["click","touchstart","mousemove","keydown"].forEach(event=>{
  document.addEventListener(event, resetInactivityTimer);
});

</script>

</body>
</html>
