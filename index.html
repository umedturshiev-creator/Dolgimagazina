<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.header{background:#000;color:white;text-align:center;padding:15px;}
.container{max-width:500px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.red{border-left:5px solid red;background:#ffecec;}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#28a745;color:white;margin-top:8px;font-weight:bold;}
button:disabled{opacity:0.6;}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
.login{position:fixed;inset:0;background:#000;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;padding:20px;text-align:center;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;}
.modal-content{background:white;padding:20px;border-radius:12px;width:90%;max-width:350px;}
</style>
</head>

<body>

<div id="loginScreen" class="login">
<h2>Вход</h2>
<input type="password" id="pinInput" placeholder="Введите PIN">
<button onclick="login()">Войти</button>
</div>

<div class="header">
<h2>Fashion&StyleLife - Долги</h2>
<div id="sellerName"></div>
</div>

<div class="container" id="appContent" style="display:none;">

<div id="statsBox"></div>

<h3>Добавить долг</h3>
<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон (9 цифр)" maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="number" placeholder="Сумма">
<input id="dueDate" type="date">
<button id="saveBtn" onclick="addDebt()" disabled>Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Введите сумму оплаты</h3>
<input type="number" id="partialAmount">
<button id="confirmBtn" onclick="confirmPayment()">Подтвердить</button>
</div>
</div>

<script>

const VERSION="10.1";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycby_o-7MYXstH16EJFflAoVTKrA1TGt7vKitbuD-EaSyyWcDcoWIPt1twnv8dlm8pdX96g/exec";

const USERS={
"0000":"Тахмина",
"5301":"Гульчехра",
"1602":"Махфират",
"1111":"Умед"
};

let currentSeller=null;
let currentRow=null;
let currentRemainder=0;

function login(){
let pin=pinInput.value.trim();
if(!USERS[pin]){alert("Неверный пароль");return;}
currentSeller=USERS[pin];
sessionStorage.setItem("seller",currentSeller);
openApp();
}

function openApp(){
loginScreen.style.display="none";
appContent.style.display="block";
sellerName.innerHTML="👤 Вошёл: <b>"+currentSeller+"</b><br>Версия: v"+VERSION;
loadDebts();
}

window.onload=function(){
let saved=sessionStorage.getItem("seller");
if(saved){currentSeller=saved;openApp();}
};

function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

statsBox.innerHTML=`
<div class="card">
💰 <b>Всего долгов:</b> ${data.allTotal} сомони<br>
👥 Общее количество должников: ${data.activeCount + data.paidCount}
</div>

<div class="card">
🟢 <b>Активные:</b> ${data.activeTotal} сомони<br>
👥 ${data.activeCount} должников
</div>

<div class="card">
🔵 <b>Оплаченные:</b> ${data.paidTotal} сомони<br>
👥 ${data.paidCount} должников
</div>

<div class="card red">
🔴 <b>Просроченные:</b> ${data.overdueTotal} сомони<br>
👥 ${data.overdueCount} должников
</div>
`;

let html="";
data.debts.forEach(d=>{
html+=`
<div class="card">
<b>${d.client}</b><br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
Остаток: <b>${d.remainder}</b> сомони
<button onclick="openPayment(${d.row},${d.remainder})">
Оплатить
</button>
</div>`;
});
debtList.innerHTML=html;

});
}

function addDebt(){
if(!client.value || phone.value.length!==9 || !amount.value || !dueDate.value){return;}
saveBtn.disabled=true;
saveBtn.innerText="⏳ Сохранение...";
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
})
.then(()=>{
client.value="";
phone.value="";
amount.value="";
dueDate.value="";
saveBtn.innerText="Сохранить";
saveBtn.disabled=true;
loadDebts();
});
}

function openPayment(row,remainder){
currentRow=row;
currentRemainder=remainder;
partialAmount.value="";
paymentModal.style.display="flex";
}

function confirmPayment(){
let pay=Number(partialAmount.value);
if(pay<=0 || pay>currentRemainder){alert("Неверная сумма");return;}
confirmBtn.disabled=true;
confirmBtn.innerText="⏳ Обработка...";
fetch(SCRIPT_URL+"?paid="+currentRow+
"&seller="+currentSeller+
"&amount="+pay)
.then(()=>{
paymentModal.style.display="none";
confirmBtn.disabled=false;
confirmBtn.innerText="Подтвердить";
loadDebts();
});
}

function checkForm(){
if(client.value && phone.value.length===9 && amount.value && dueDate.value){
saveBtn.disabled=false;
}else{
saveBtn.disabled=true;
}
}

client.addEventListener("input",checkForm);
phone.addEventListener("input",checkForm);
amount.addEventListener("input",checkForm);
dueDate.addEventListener("input",checkForm);

</script>

</body>
</html>
