<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.header {background:#000;color:white;padding:15px;text-align:center;}
.logo {height:50px;margin-bottom:5px;}
.container {padding:15px;max-width:600px;margin:auto;}
.card {background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
button {width:100%;padding:10px;border:none;border-radius:8px;background:#28a745;color:white;margin-top:8px;font-weight:600;}
button:disabled {opacity:0.5;}
input {width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
.login, .lock-screen {
  position:fixed;inset:0;background:#000;color:white;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:9999;padding:20px;text-align:center;
}
.lock-screen {display:none;}
.install-btn {background:#007bff;}
.overdue {background:#ffe6e6;color:#b00000;padding:10px;border-radius:10px;margin-bottom:10px;font-weight:bold;}
</style>
</head>

<body>

<div id="loginScreen" class="login">
  <h2>Вход в систему</h2>
  <input type="password" id="pinInput" placeholder="Введите PIN">
  <button onclick="login()">Войти</button>
  <button style="background:#444;" onclick="enableBiometric()">🔐 Включить биометрию</button>
</div>

<div id="lockScreen" class="lock-screen">
  <h2>Система заблокирована</h2>
  <button onclick="unlock()">🔐 Разблокировать</button>
</div>

<div class="header">
  <img src="logo.png" class="logo">
  <div><b>Fashion&StyleLife - Долги</b></div>
</div>

<div class="container">

<button id="installBtn" class="install-btn" style="display:none;">
📲 Создать приложение
</button>

<div id="appContent" style="display:none;">

<div id="summaryBox" class="card"></div>
<div id="overdueBox"></div>

<h3>Добавить долг</h3>
<input type="text" id="client" placeholder="Имя клиента">
<input type="text" id="phone" maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
placeholder="Телефон (9 цифр)">
<input type="number" id="amount"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
placeholder="Сумма">
<label>Выберите дату возврата</label>
<input type="date" id="dueDate">
<button id="saveBtn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>
</div>

<script>

// ================= PWA =================
let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault(); deferredPrompt=e;
 installBtn.style.display="block";
});

installBtn.onclick=async()=>{
 if(deferredPrompt){deferredPrompt.prompt(); deferredPrompt=null;}
};

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("service-worker.js");
}

// ================= USERS =================
const USERS={"1111":"Умед","2222":"Фарзона","3333":"Шахром"};

// ================= BIOMETRIC =================
function isBiometricAvailable(){return window.PublicKeyCredential!==undefined;}

async function enableBiometric(){
 if(!isBiometricAvailable()){alert("Не поддерживается");return;}
 try{
  const publicKey={challenge:new Uint8Array(32),
    rp:{name:"Fashion&StyleLife"},
    user:{id:new Uint8Array(16),name:"user",displayName:"CRM User"},
    pubKeyCredParams:[{type:"public-key",alg:-7}],
    authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},
    timeout:60000,attestation:"none"};
  await navigator.credentials.create({publicKey});
  localStorage.setItem("biometricEnabled","true");
  alert("Биометрия включена");
 }catch(e){alert("Ошибка");}
}

async function verifyBiometric(){
 if(localStorage.getItem("biometricEnabled")!=="true")return true;
 try{
  const publicKey={challenge:new Uint8Array(32),timeout:60000,userVerification:"required"};
  await navigator.credentials.get({publicKey});
  return true;
 }catch(e){return false;}
}

// ================= LOGIN =================
async function login(){
 const pin=pinInput.value;
 if(!USERS[pin]){alert("Неверный PIN");return;}
 localStorage.setItem("seller",USERS[pin]);
 const ok=await verifyBiometric();
 if(!ok){alert("Биометрия не подтверждена");return;}
 openApp();
}

window.onload=async()=>{
 if(localStorage.getItem("seller")){
  const ok=await verifyBiometric();
  if(ok)openApp();
 }
};

function openApp(){
 loginScreen.style.display="none";
 appContent.style.display="block";
 resetTimer();
 loadDebts();
}

// ================= AUTO LOCK =================
let timer;
function resetTimer(){clearTimeout(timer);timer=setTimeout(lockApp,5*60*1000);}
function lockApp(){appContent.style.display="none";lockScreen.style.display="flex";}
async function unlock(){if(await verifyBiometric()){lockScreen.style.display="none";appContent.style.display="block";resetTimer();}}
["click","keydown","mousemove","touchstart"].forEach(e=>document.addEventListener(e,resetTimer));

// ================= CRM =================
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbygSj1FHcHUQPmNfndfYv_qhbAsSvaacl65quErOVKDKuaepPc7mkrGbmIW5GpwqJjD-Q/exec";

[client,phone,amount,dueDate].forEach(el=>{
 el.addEventListener("input",()=>{
  saveBtn.disabled=!(client.value && phone.value.length===9 && amount.value && dueDate.value);
 });
});

function loadDebts(){
 fetch(SCRIPT_URL).then(r=>r.json()).then(data=>{
  summaryBox.innerHTML=`💰 Всего: ${data.allTotal} сомони |
  🟢 Активные: ${data.activeTotal} (${data.activeCount}) |
  🔵 Оплаченные: ${data.paidTotal} (${data.paidCount})`;
  overdueBox.innerHTML=`<div class="overdue">Просрочено: ${data.overdueCount} на ${data.overdueTotal} сомони</div>`;
  let html="";
  data.debts.forEach(d=>{
   html+=`<div class="card" id="row-${d.row}">
   <b>${d.client}</b><br>
   Телефон: ${d.phone}<br>
   Сумма: ${d.amount} сомони
   <button onclick="markPaid(${d.row})">Оплачено</button>
   </div>`;
  });
  debtList.innerHTML=html;
 });
}

function addDebt(){
 fetch(SCRIPT_URL,{
  method:"POST",
  body:JSON.stringify({
   client:client.value,
   phone:phone.value,
   amount:amount.value,
   dueDate:dueDate.value,
   seller:localStorage.getItem("seller")
  })
 }).then(()=>{loadDebts();client.value="";phone.value="";amount.value="";dueDate.value="";saveBtn.disabled=true;});
}

function markPaid(row){
 if(!confirm("Подтвердить оплату?"))return;
 fetch(SCRIPT_URL+"?paid="+row+"&seller="+localStorage.getItem("seller"))
 .then(()=>{document.getElementById("row-"+row).remove();loadDebts();});
}

</script>
</body>
</html>
