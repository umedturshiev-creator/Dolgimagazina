<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.header {background:#000;color:white;padding:15px;text-align:center;}
.container {padding:15px;max-width:500px;margin:auto;}
.card {background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
button {width:100%;padding:10px;border:none;border-radius:8px;background:#28a745;color:white;margin-top:8px;}
button:disabled {opacity:0.5;}
input {width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
.login {position:fixed;inset:0;background:#000;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;}
</style>
</head>

<body>

<div id="loginScreen" class="login">
  <h2>Вход в систему</h2>
  <input type="password" id="pinInput" placeholder="Введите PIN">
  <button onclick="login()">Войти</button>
</div>

<div class="header">
  Fashion&StyleLife - Долги
  <div id="versionBox">v6.0</div>
</div>

<div class="container">

<div class="card" id="summaryBox"></div>
<div class="card" id="overdueBox"></div>

<h3>Добавить долг</h3>

<input type="text" id="client" placeholder="Имя клиента">
<input type="text" id="phone" maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
placeholder="Телефон (9 цифр)">
<input type="number" id="amount"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
placeholder="Сумма">
<label>Выберите дату возврата</label>
<input type="date" id="dueDate">

<button id="saveBtn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygSj1FHcHUQPmNfndfYv_qhbAsSvaacl65quErOVKDKuaepPc7mkrGbmIW5GpwqJjD-Q/exec";

const USERS = {
  "1111": "Umed",
  "0000": "Tasya",
  "3333": "Mahfirat"
};

function login() {
  const pin = pinInput.value;
  if (USERS[pin]) {
    localStorage.setItem("seller", USERS[pin]);
    loginScreen.style.display = "none";
    loadDebts();
  } else alert("Неверный PIN");
}

if (localStorage.getItem("seller")) {
  loginScreen.style.display = "none";
  loadDebts();
}

const client = document.getElementById("client");
const phone = document.getElementById("phone");
const amount = document.getElementById("amount");
const dueDate = document.getElementById("dueDate");
const saveBtn = document.getElementById("saveBtn");

[client, phone, amount, dueDate].forEach(el => {
  el.addEventListener("input", () => {
    saveBtn.disabled = !(client.value && phone.value.length===9 && amount.value && dueDate.value);
  });
});

function loadDebts() {

  fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {

    versionBox.innerText = "v" + data.version;

    summaryBox.innerHTML =
      "Всего: " + data.allTotal + " сомони<br>" +
      "Активные: " + data.activeTotal + " — " + data.activeCount + "<br>" +
      "Оплаченные: " + data.paidTotal + " — " + data.paidCount;

    overdueBox.innerHTML =
      "Просрочено: " + data.overdueCount +
      " на сумму " + data.overdueTotal;

    let stats = "<br><b>По продавцам:</b><br>";

    for (let s in data.sellerStats) {
      stats += s + ": " +
        data.sellerStats[s].total +
        " (" + data.sellerStats[s].count + ")<br>";
    }

    summaryBox.innerHTML += stats;

    let html = "";

    data.debts.forEach(d => {
      html += `
      <div class="card" style="${d.overdue?'border-left:5px solid red':''}">
        <b>${d.client}</b><br>
        Телефон: ${d.phone}<br>
        Сумма: ${d.amount}<br>
        <button onclick="markPaid(${d.row})">Оплачено</button>
      </div>`;
    });

    debtList.innerHTML = html;
  });
}

function addDebt() {

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      client:client.value,
      phone:phone.value,
      amount:amount.value,
      dueDate:dueDate.value,
      seller:localStorage.getItem("seller")
    })
  }).then(()=>{
    client.value="";
    phone.value="";
    amount.value="";
    dueDate.value="";
    saveBtn.disabled=true;
    loadDebts();
  });
}

function markPaid(row) {

  if (!confirm("Подтвердить оплату?")) return;

  fetch(SCRIPT_URL+"?paid="+row+
  "&seller="+localStorage.getItem("seller"))
  .then(()=>loadDebts());
}

</script>

</body>
</html>
