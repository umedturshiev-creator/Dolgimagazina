<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

.header{background:#000;color:white;text-align:center;padding:16px;}

.container{padding:12px;max-width:100%;}

.card{
background:white;
padding:14px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.07);
font-size:14px;
}

.overdue{background:#ffe5e5;border-left:5px solid red;}
.warning{background:#fff8e1;border-left:5px solid orange;}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
font-size:14px;
}

.save-btn{background:#28a745;color:white;}
.save-btn:disabled{opacity:0.5;}

.pay-btn{background:#28a745;color:white;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

label.date-label{
color:red;
font-weight:bold;
}

.modal{
position:fixed;inset:0;background:rgba(0,0,0,0.6);
display:none;align-items:center;justify-content:center;
}

.modal-content{
background:white;padding:20px;border-radius:14px;width:90%;max-width:320px;text-align:center;
}

.loader{font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<h2>Fashion&StyleLife - Долги</h2>
</div>

<div class="container">

<div id="statsBox"></div>

<h3>Добавить долг</h3>
<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон" maxlength="9"
inputmode="numeric" pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="Сумма">

<label class="date-label">Выберите дату оплаты</label>
<input id="dueDate" type="date">

<button id="saveBtn" class="save-btn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<!-- МОДАЛКА ОПЛАТЫ -->
<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Введите сумму оплаты</h3>
<input type="tel" inputmode="numeric" pattern="[0-9]*" id="partialAmount">
<button class="pay-btn" onclick="confirmPayment()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- МОДАЛКА ЗАГРУЗКИ -->
<div class="modal" id="loadingModal">
<div class="modal-content">
<div class="loader">⏳ Идет сохранение записи...</div>
</div>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzblKRGaz7DW0TCkBFc4dzpK4JCPWhba1aLksGeMt3gxVAIDBtoVw6_vS1dFe1tJv7iUA/exec";

let currentRow=null;
let currentRemainder=0;

function toggleStats(){
let el=document.getElementById("statsContent");
el.style.display = el.style.display==="none" ? "block" : "none";
}

function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

// ===== СТАТИСТИКА =====
statsBox.innerHTML=`
<div class="card">
<b onclick="toggleStats()" style="cursor:pointer;">📊 Статистика</b>
<div id="statsContent" style="display:none;margin-top:8px;">
Активные долги: ${data.activeTotal} сомони от ${data.activeCount} клиентов<br>
Оплаченные долги: ${data.paidTotal} сомони от ${data.paidCount} клиентов<br><br>
<b style="color:red;">
Просроченные долги: ${data.overdueTotal} сомони от ${data.overdueCount} клиента
</b>
</div>
</div>
`;

// ===== СОРТИРОВКА =====
let debts=data.debts;

debts.sort((a,b)=>{

// 1. Сначала просроченные
if(a.isOverdue && !b.isOverdue) return -1;
if(!a.isOverdue && b.isOverdue) return 1;

// 2. Потом по ближайшей дате
return new Date(a.dueDate) - new Date(b.dueDate);

});

let html="";
let today=new Date(); today.setHours(0,0,0,0);

debts.forEach(d=>{
let due=new Date(d.dueDate); due.setHours(0,0,0,0);
let diffDays=Math.ceil((due - today)/(1000*60*60*24));

let cls="";
let extra="";

if(d.isOverdue){
cls="overdue";
let days=Math.abs(diffDays);
extra=`<div style="color:red;">⚠ Просрочено на ${days} дн.</div>`;
}
else if(diffDays<=2 && diffDays>=0){
cls="warning";
extra=`<div style="color:orange;">Осталось ${diffDays} дн.</div>`;
}

html+=`
<div class="card ${cls}">
<b>${d.client}</b> (до ${d.dueDate})<br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
Остаток: <b>${d.remainder}</b> сомони
${extra}
<button class="pay-btn" onclick="openPayment(${d.row},${d.remainder})">Оплатить</button>
</div>
`;
});

debtList.innerHTML=html;
});
}

function validateForm(){
if(client.value && phone.value.length===9 && amount.value && dueDate.value){
saveBtn.disabled=false;
}else{
saveBtn.disabled=true;
}
}

client.addEventListener("input",validateForm);
phone.addEventListener("input",validateForm);
amount.addEventListener("input",validateForm);
dueDate.addEventListener("input",validateForm);

function addDebt(){
loadingModal.style.display="flex";

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:"Система"
})
})
.then(()=>location.reload());
}

function openPayment(row,remainder){
currentRow=row;
currentRemainder=remainder;
paymentModal.style.display="flex";
}

function closeModal(){
paymentModal.style.display="none";
}

function confirmPayment(){
loadingModal.style.display="flex";

let pay=Number(partialAmount.value);

if(pay<=0 || pay>currentRemainder){
alert("Неверная сумма");
loadingModal.style.display="none";
return;
}

fetch(SCRIPT_URL+"?paid="+currentRow+"&amount="+pay+"&seller=Система")
.then(()=>location.reload());
}

loadDebts();

</script>
</body>
</html>
