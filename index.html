<style>
:root{
  --bg-1:#020617;
  --bg-2:#0b1120;
  --bg-3:#111827;
  --panel-1:rgba(15,23,42,0.88);
  --panel-2:rgba(30,41,59,0.88);
  --panel-solid:#111827;
  --card-border:rgba(148,163,184,0.14);
  --text-1:#f8fafc;
  --text-2:#cbd5e1;
  --text-3:#94a3b8;
  --primary-1:#2563eb;
  --primary-2:#1d4ed8;
  --primary-3:#60a5fa;
  --success-1:#22c55e;
  --success-2:#16a34a;
  --danger-1:#ef4444;
  --danger-2:#dc2626;
  --warning-1:#f59e0b;
  --warning-2:#d97706;
  --purple-1:#8b5cf6;
  --purple-2:#7c3aed;
  --shadow-xl:0 24px 60px rgba(2,6,23,0.5);
  --shadow-lg:0 16px 40px rgba(2,6,23,0.38);
  --shadow-md:0 10px 24px rgba(2,6,23,0.28);
  --radius-xl:22px;
  --radius-lg:18px;
  --radius-md:14px;
  --radius-sm:12px;
}

*{box-sizing:border-box;}

html{
  min-height:100%;
  background:
    radial-gradient(circle at top left, rgba(37,99,235,0.20), transparent 34%),
    radial-gradient(circle at top right, rgba(139,92,246,0.16), transparent 28%),
    linear-gradient(145deg,var(--bg-1),var(--bg-2) 42%,#111827 100%);
}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  color:var(--text-1);
  background:
    radial-gradient(circle at top left, rgba(37,99,235,0.16), transparent 32%),
    radial-gradient(circle at bottom right, rgba(139,92,246,0.14), transparent 28%),
    linear-gradient(145deg,var(--bg-1),var(--bg-2) 42%,#111827 100%);
  background-attachment:fixed;
}

.header{
  position:sticky;
  top:0;
  z-index:50;
  background:
    linear-gradient(135deg, rgba(15,23,42,0.92), rgba(30,41,59,0.88)),
    linear-gradient(135deg, rgba(37,99,235,0.16), rgba(139,92,246,0.10));
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  color:var(--text-1);
  padding:14px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  border-bottom:1px solid rgba(148,163,184,0.12);
  box-shadow:0 14px 40px rgba(2,6,23,0.45);
}

.header-left,
.header-right{
  min-width:60px;
  display:flex;
  align-items:center;
}

.header-center{
  flex:1;
  text-align:center;
  min-width:0;
}

.header-center h2{
  margin:0;
  font-size:18px;
  line-height:1.2;
  color:var(--text-1);
  letter-spacing:0.2px;
}

.user-meta{
  margin-top:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  color:var(--text-2);
}

#userInfo{
  margin-top:0;
  font-size:12px;
  color:var(--text-2);
}

.lang-switch{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(148,163,184,0.18);
  border-radius:18px;
  padding:3px;
  gap:3px;
  box-shadow:var(--shadow-md);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.compact-lang{
  height:36px;
}

.lang-btn{
  border:none;
  background:transparent;
  color:var(--text-2);
  padding:0 12px;
  height:30px;
  min-width:42px;
  font-size:13px;
  font-weight:700;
  border-radius:14px;
  cursor:pointer;
  margin:0;
  transition:all .2s ease;
}

.lang-btn.active{
  background:linear-gradient(135deg,var(--primary-1),var(--primary-2));
  color:#ffffff;
  box-shadow:0 6px 18px rgba(37,99,235,0.35);
}

.mini-refresh-btn{
  margin:0;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg, rgba(37,99,235,0.90), rgba(124,58,237,0.90));
  color:white;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
  padding:0 12px;
  height:30px;
  min-width:auto;
  width:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 12px 24px rgba(37,99,235,0.28);
  transition:transform .15s ease, box-shadow .2s ease;
}

.export-btn{
  width:52px;
  height:38px;
  margin:0;
  border-radius:12px;
  border:1px solid rgba(148,163,184,0.12);
  background:linear-gradient(135deg, rgba(37,99,235,0.92), rgba(29,78,216,0.92));
  color:white;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 12px 24px rgba(37,99,235,0.25);
}

.logout-btn{
  width:38px;
  height:38px;
  margin:0;
  border-radius:50%;
  border:1px solid rgba(148,163,184,0.12);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-left:auto;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.pdf-report{
  width:1120px;
  background:#fff;
  color:#000;
  padding:16px;
  font-family:Arial,sans-serif;
  box-sizing:border-box;
  border-radius:18px;
}

.pdf-report h1{
  margin:0 0 10px 0;
  font-size:20px;
}

.pdf-meta{
  margin-bottom:14px;
  font-size:12px;
  line-height:1.5;
}

.pdf-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:10px;
}

.pdf-table th,
.pdf-table td{
  border:1px solid #ccc;
  padding:5px;
  text-align:left;
  vertical-align:top;
  word-break:break-word;
  overflow-wrap:break-word;
}

.pdf-table th{
  background:#f3f4f6;
}

.pdf-table th:nth-child(1),
.pdf-table td:nth-child(1){width:4%;}
.pdf-table th:nth-child(2),
.pdf-table td:nth-child(2){width:20%;}
.pdf-table th:nth-child(3),
.pdf-table td:nth-child(3){width:12%;}
.pdf-table th:nth-child(4),
.pdf-table td:nth-child(4){width:12%;}
.pdf-table th:nth-child(5),
.pdf-table td:nth-child(5){width:13%;}
.pdf-table th:nth-child(6),
.pdf-table td:nth-child(6){width:13%;}
.pdf-table th:nth-child(7),
.pdf-table td:nth-child(7){width:13%;}
.pdf-table th:nth-child(8),
.pdf-table td:nth-child(8){width:13%;}

.pdf-table thead{display:table-header-group;}
.pdf-table tr{page-break-inside:avoid;}

.pdf-status-overdue{color:#b91c1c;font-weight:bold;}
.pdf-status-partial{color:#15803d;font-weight:bold;}
.pdf-status-active{color:#1d4ed8;font-weight:bold;}
.pdf-status-closed{color:#374151;font-weight:bold;}

.login{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 32%),
    radial-gradient(circle at bottom right, rgba(139,92,246,0.16), transparent 28%),
    linear-gradient(145deg,var(--bg-1),var(--bg-2) 45%,#111827 100%);
  color:var(--text-1);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:24px;
}

.login img{
  width:120px;
  margin-bottom:22px;
  filter:drop-shadow(0 16px 28px rgba(0,0,0,0.38));
}

.login h2{
  margin:0 0 10px 0;
  font-size:26px;
  letter-spacing:0.3px;
}

.container{
  padding:14px;
  max-width:980px;
  margin:0 auto;
}

.card{
  background:
    linear-gradient(180deg, rgba(30,41,59,0.92), rgba(15,23,42,0.94)),
    linear-gradient(135deg, rgba(37,99,235,0.08), rgba(139,92,246,0.06));
  padding:16px;
  border-radius:20px;
  margin-bottom:14px;
  box-shadow:var(--shadow-lg);
  font-size:14px;
  color:var(--text-1);
  border:1px solid var(--card-border);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  line-height:1.55;
}

.card b{
  color:#ffffff;
}

.overdue{
  background:
    linear-gradient(180deg, rgba(69,10,10,0.92), rgba(31,10,10,0.95)),
    linear-gradient(135deg, rgba(239,68,68,0.18), rgba(124,58,237,0.05));
  border-left:5px solid #ef4444;
}

.warning{
  background:
    linear-gradient(180deg, rgba(66,32,6,0.92), rgba(28,20,5,0.96)),
    linear-gradient(135deg, rgba(245,158,11,0.16), rgba(37,99,235,0.05));
  border-left:5px solid #f59e0b;
}

button{
  width:100%;
  padding:11px 14px;
  border:none;
  border-radius:14px;
  margin-top:6px;
  font-weight:700;
  font-size:14px;
  color:white;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .2s ease, opacity .2s ease;
}

button:active,
.mini-refresh-btn:active,
.export-btn:active,
.logout-btn:active{
  transform:scale(0.98);
}

.save-btn{
  background:linear-gradient(135deg,var(--success-1),var(--success-2));
  color:white;
  box-shadow:0 14px 28px rgba(34,197,94,0.22);
}
.save-btn:disabled{opacity:0.5;}
.pay-btn{
  background:linear-gradient(135deg,var(--success-1),var(--success-2));
  color:white;
  box-shadow:0 14px 28px rgba(34,197,94,0.22);
}

.half-btn{
  width:100%;
  margin-top:0;
}

.add-debt-btn{
  background:linear-gradient(135deg,var(--primary-1),var(--primary-2));
  color:white;
  box-shadow:0 14px 28px rgba(37,99,235,0.22);
}

.add-debt-btn:active{
  transform:scale(0.97);
}

#fullCloseBtn{
  background:linear-gradient(135deg,var(--danger-1),var(--danger-2));
  color:white;
  box-shadow:0 14px 28px rgba(239,68,68,0.22);
  transition:all 0.1s ease;
}

#fullCloseBtn:active{
  transform:scale(0.97);
}

.action-row{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.action-row a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:14px;
  font-size:13px;
  font-weight:700;
  text-decoration:none;

}
.call-btn{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.wa-btn{background:linear-gradient(135deg,#22c55e,#16a34a);}

input{
  width:100%;
  padding:12px 14px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid rgba(148,163,184,0.18);
  font-size:14px;
  color:var(--text-1);
  background:rgba(15,23,42,0.88);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  outline:none;
}

input::placeholder{
  color:var(--text-3);
}

input:focus{
  border-color:rgba(96,165,250,0.65);
  box-shadow:0 0 0 4px rgba(59,130,246,0.12);
}

.search-box{
  background:rgba(15,23,42,0.74);
  padding:12px;
  border-radius:18px;
  margin-bottom:14px;
  border:1px solid rgba(148,163,184,0.12);
  box-shadow:var(--shadow-md);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,0.72);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9998;
  padding:16px;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}

.modal-content{
  background:
    linear-gradient(180deg, rgba(30,41,59,0.95), rgba(15,23,42,0.97)),
    linear-gradient(135deg, rgba(37,99,235,0.07), rgba(139,92,246,0.05));
  padding:22px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:left;
  max-height:80vh;
  overflow:auto;
  color:var(--text-1);
  border:1px solid rgba(148,163,184,0.14);
  box-shadow:var(--shadow-xl);
}

.modal-content h3{
  margin-top:0;
  color:#fff;
}

.loader{
  animation:pulse 1s infinite;
  text-align:center;
  font-weight:bold;
  margin-top:10px;
  color:var(--text-2);
}

@keyframes pulse{
  0%{opacity:0.4;}
  50%{opacity:1;}
  100%{opacity:0.4;}
}

.merge-modal{
  max-width:420px;
  border-radius:22px;
  padding:22px;
}

.merge-modal h3{
  margin:0 0 14px 0;
  font-size:18px;
  color:#ffffff;
}

.merge-info{
  background:rgba(15,23,42,0.70);
  border:1px solid rgba(148,163,184,0.14);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
  line-height:1.6;
  font-size:14px;
  color:var(--text-2);
}

.merge-actions{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.merge-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.append-btn{
  background:linear-gradient(135deg,var(--success-1),var(--success-2));
  color:white;
}

.create-btn{
  background:linear-gradient(135deg,var(--primary-1),var(--primary-2));
  color:white;
}

.cancel-btn{
  background:rgba(148,163,184,0.14);
  color:var(--text-1);
}

.sum-history-box{
  margin-top:12px;
  padding:12px 14px;
  background:linear-gradient(135deg, rgba(91,33,182,0.22), rgba(30,41,59,0.54));
  border-left:4px solid #8b5cf6;
  border-radius:14px;
  border:1px solid rgba(167,139,250,0.16);
}

.sum-history-title{
  font-size:13px;
  font-weight:bold;
  color:#c4b5fd;
  margin-bottom:6px;
}

.sum-history-item{
  font-size:12px;
  color:var(--text-2);
  margin-bottom:4px;
  line-height:1.4;
  white-space:pre-wrap;
}

.sum-history-item:last-child{
  margin-bottom:0;
}

.toast{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%) translateY(20px);
  min-width:280px;
  max-width:90%;
  background:#0f172a;
  color:#fff;
  padding:14px 16px;
  border-radius:16px;
  box-shadow:0 16px 40px rgba(2,6,23,0.45);
  font-size:14px;
  line-height:1.5;
  z-index:99999;
  opacity:0;
  pointer-events:none;
  transition:all 0.3s ease;
  border:1px solid rgba(148,163,184,0.12);
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast.success{
  background:linear-gradient(135deg,#15803d,#22c55e);
}

.toast.append{
  background:linear-gradient(135deg,#6d28d9,#8b5cf6);
}

.toast.error{
  background:linear-gradient(135deg,#b91c1c,#ef4444);
}

h3{
  color:#ffffff;
  margin-top:0;
}

label{
  color:#fca5a5 !important;
}

  /* ===== PREMIUM / GLASS / UX ===== */

body{
  background:
    radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
    radial-gradient(circle at top right, rgba(168,85,247,0.12), transparent 30%),
    linear-gradient(180deg,#071120 0%, #0b172a 45%, #09111f 100%) !important;
  min-height:100vh;
}

/* стеклянный header */
.header{
  position:sticky;
  top:0;
  z-index:50;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  background:linear-gradient(135deg,rgba(15,23,42,0.82),rgba(30,58,138,0.62)) !important;
  border-bottom:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.28);
}

/* контейнер чуть воздушнее */
.container{
  padding:14px;
  max-width:760px;
  margin:0 auto;
}

/* glass карточки */
.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(30,41,59,0.78),rgba(15,23,42,0.72)) !important;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.30),
    inset 0 1px 0 rgba(255,255,255,0.06);
  animation:cardFadeUp 0.45s ease both;
  transition:transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.32),transparent);
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:
    0 16px 36px rgba(0,0,0,0.34),
    inset 0 1px 0 rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.14);
}

/* карточки статусов */
.overdue{
  background:linear-gradient(135deg,rgba(69,17,17,0.88),rgba(31,10,10,0.84)) !important;
  border-left:5px solid #ef4444;
}

.warning{
  background:linear-gradient(135deg,rgba(74,54,12,0.86),rgba(33,23,5,0.82)) !important;
  border-left:5px solid #f59e0b;
}

/* glass блок поиска */
.search-box{
  background:rgba(15,23,42,0.60) !important;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 24px rgba(0,0,0,0.20);
}

/* input premium */
input{
  background:rgba(2,6,23,0.72) !important;
  color:#e2e8f0 !important;
  border:1px solid rgba(148,163,184,0.22) !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
  transition:border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

input:focus{
  outline:none;
  border-color:rgba(59,130,246,0.85) !important;
  box-shadow:
    0 0 0 3px rgba(59,130,246,0.16),
    0 8px 20px rgba(37,99,235,0.18);
  transform:translateY(-1px);
}

input::placeholder{
  color:#94a3b8;
}

/* общие кнопки premium */
button,
.action-row a{
  transition:
    transform 0.14s ease,
    box-shadow 0.18s ease,
    filter 0.18s ease,
    opacity 0.18s ease;
}

button:hover,
.action-row a:hover{
  filter:brightness(1.04);
}

button:active,
.action-row a:active{
  transform:scale(0.97);
}

/* основные кнопки */
.save-btn,
.pay-btn{
  background:linear-gradient(135deg,#22c55e,#16a34a) !important;
  color:#fff !important;
  box-shadow:0 8px 18px rgba(34,197,94,0.28);
}

.add-debt-btn{

function showToast(message, type = "success"){
  const toast = document.getElementById("toast");
  if (!toast) return;

  toast.className = "toast";
  toast.classList.add(type);
  toast.innerHTML = message;

  clearTimeout(toastTimer);

  requestAnimationFrame(() => {
    toast.classList.add("show");
  });

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 2600);
}

function askDebtSaveMode(existingDebt, newDebt){
  return new Promise((resolve) => {
    mergeDebtResolver = resolve;

    const modal = document.getElementById("mergeDebtModal");
    const info = document.getElementById("mergeDebtInfo");
    const appendBtn = document.getElementById("mergeAppendBtn");
    const createBtn = document.getElementById("mergeCreateBtn");
    const cancelBtn = document.getElementById("mergeCancelBtn");

    const clientName = existingDebt.client || "-";
    const phone = newDebt.phone || existingDebt.phone || "-";
    const currentRemainder = Number(existingDebt.remainder || 0);
    const newAmount = Number(newDebt.amount || 0);

    info.innerHTML = `
      <div>${t("mergeDebtText")}</div>
      <div style="margin-top:10px;"><b>${t("mergeClient")}:</b> ${clientName}</div>
      <div><b>${t("mergePhone")}:</b> ${phone}</div>
      <div><b>${t("mergeCurrentRemainder")}:</b> ${currentRemainder} ${t("somoni")}</div>
      <div><b>${t("mergeNewAmount")}:</b> ${newAmount} ${t("somoni")}</div>
    `;

    modal.style.display = "flex";

    appendBtn.onclick = function () {
      closeMergeDebtModal("append");
    };

    createBtn.onclick = function () {
      closeMergeDebtModal("new");
    };

    cancelBtn.onclick = function () {
      closeMergeDebtModal("cancel");
    };
  });
}

function closeMergeDebtModal(result){
  const modal = document.getElementById("mergeDebtModal");
  const appendBtn = document.getElementById("mergeAppendBtn");
  const createBtn = document.getElementById("mergeCreateBtn");
  const cancelBtn = document.getElementById("mergeCancelBtn");

  modal.style.display = "none";
  appendBtn.onclick = null;
  createBtn.onclick = null;
  cancelBtn.onclick = null;

  if (mergeDebtResolver) {
    mergeDebtResolver(result);
    mergeDebtResolver = null;
  }
}

function parseSumHistory(notification){
  if (!notification) return [];

  return String(notification)
    .split(/\n|\|/)
    .map(item => item.trim())
    .filter(item => item && item.toLowerCase().includes("суммирован"));
}

function renderSumHistory(notification){
  const items = parseSumHistory(notification);
  if (!items.length) return "";

  const historyHtml = items.map(item => {
    return `<div class="sum-history-item">• ${item}</div>`;
  }).join("");

  return `
    <div class="sum-history-box">
      <div class="sum-history-title">➕ ${t("sumHistoryTitle")}</div>
      ${historyHtml}
    </div>
  `;
}

async function addDebt(){
  if (saveBtn.disabled) return;

  const clientName = client.value.trim();
  const phoneValue = phone.value.trim();
  const amountValue = Number(amount.value || 0);
  const dueDateValue = dueDate.value;

  if (!clientName || !phoneValue || !amountValue || !dueDateValue) return;

  const normalizedPhone = phoneValue.replace(/\D/g, "");

  const existingDebt = allDebts.find(d => {
    const debtPhone = String(d.phone || "").replace(/\D/g, "");
    return debtPhone === normalizedPhone && Number(d.remainder || 0) > 0;
  });

  let payload = {
    client: clientName,
    phone: phoneValue,
    amount: amountValue,
    dueDate: dueDateValue,
    seller: currentSeller
  };

  if (existingDebt) {
    const action = await askDebtSaveMode(existingDebt, payload);

    if (action === "cancel") {
      showToast(`ℹ️ ${t("cancelActionToast")}`, "error");
      return;
    }

    if (action === "append") {
      const now = new Date();
      const formattedDate =
        String(now.getDate()).padStart(2, "0") + "." +
        String(now.getMonth() + 1).padStart(2, "0") + "." +
        now.getFullYear() + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0");

      payload.mode = "append";
      payload.targetRow = existingDebt.row;
      payload.noteText = `Долг суммирован: +${amountValue} (${formattedDate})`;
    }
  }

  saveLoader.style.display="block";
  saveBtn.disabled=true;

  try {
    const response = await fetch(SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const result = await response.json();

    saveLoader.style.display="none";
    client.value="";
    phone.value="";
    amount.value="";
    dueDate.value="";
    saveBtn.disabled=true;

    if (result.success) {
      if (payload.mode === "append") {
        showToast(
          `✅ <b>${t("appendSuccessToast")}</b><br>👤 ${clientName}<br>💰 +${amountValue} ${t("somoni")}`,
          "append"
        );
      } else {
        showToast(`✅ <b>${t("newDebtSuccessToast")}</b>`, "success");
      }

      loadDebts();
    } else {
      showToast(`❌ ${t("errorSaveToast")}`, "error");
    }
  } catch(e) {
    saveLoader.style.display="none";
    saveBtn.disabled=false;
    showToast(`❌ ${t("errorSaveToast")}`, "error");
  }
}

  }
}

/* ---------- ОТРИСОВКА ---------- */

function renderDebts(list){
  list.sort((a,b)=>{
    if(a.isOverdue && !b.isOverdue) return -1;
    if(!a.isOverdue && b.isOverdue) return 1;
    return new Date(a.dueDate||0) - new Date(b.dueDate||0);
  });

  let html = "";
  let today = new Date();
  today.setHours(0,0,0,0);

  list.forEach(d=>{
    let due = new Date(d.dueDate);
    due.setHours(0,0,0,0);
    let diffDays = Math.ceil((due-today)/(1000*60*60*24));

    let cardClass = "card";
    let extra = "";

    if(d.isOverdue || diffDays < 0){
      cardClass += " overdue";
      extra = `<div style="color:#fca5a5;font-weight:bold;">${t("overdueDays",{days:Math.abs(diffDays)})}</div>`;
    } else if(diffDays <= 2){
      cardClass += " warning";
      extra = `<div style="color:orange;">${t("leftDays",{days:diffDays})}</div>`;
    }

    let waText = encodeURIComponent(t("waReminder", { amount: d.remainder }));
    let phoneFull = "992" + d.phone;
    let sumHistoryHtml = renderSumHistory(d.notification);

    html += `
    <div class="${cardClass}">
      <b>${d.client}</b> (${t("dueDateText",{date:d.dueDate})})<br>
      ${t("phonePlaceholder")}: ${d.phone}<br>
      ${t("debtAmount")}: ${d.total} ${t("somoni")}<br>
      ${t("paidAmount")}: ${d.paid || 0} ${t("somoni")}<br>
      ${t("lastPayment")}: ${d.partialPayment || 0} ${t("somoni")}<br>
      ${t("remainder")}: <b>${d.remainder}</b> ${t("somoni")}<br>
      ${d.isPartial ? `<div style="color:#28a745;font-weight:bold;">${t("hasPayment")}</div>` : ""}
      ${sumHistoryHtml}
      ${extra}

      <div class="action-row">
  <button class="pay-btn half-btn" onclick="openPayment(${d.row},${d.remainder})">
    ${t("payBtn")}
  </button>

  <button class="add-debt-btn half-btn" onclick="openAddToDebtModal(${d.row}, '${String(d.client).replace(/'/g,"\\'")}', '${String(d.phone).replace(/'/g,"\\'")}', ${d.remainder})">
    ➕ ${t("addToDebtBtn")}
  </button>
</div>

      <div class="action-row">
        <a class="call-btn" href="tel:+${phoneFull}">📞 ${t("callBtn")}</a>
        <a class="wa-btn" target="_blank" href="https://wa.me/${phoneFull}?text=${waText}">
          💬 ${t("whatsappBtn")}
        </a>
      </div>

      <button onclick="showHistory('${String(d.client).replace(/'/g,"\\'")}')">
        📂 ${t("historyBtn")}
      </button>
    </div>
    `;
  });

  debtList.innerHTML = html || `<div class="card">${t("noData")}</div>`;
}

function applySearch(){
  let val = searchInput.value.toLowerCase().trim();

  if(val === ""){
    renderDebts([...allDebts]);
    return;
  }

  let filtered = allDebts.filter(d => {
    let nameMatch = d.client && d.client.toLowerCase().includes(val);
    let phoneMatch = d.phone && d.phone.toString().includes(val);
    return nameMatch || phoneMatch;
  });

  renderDebts(filtered);
}

async function confirmAddToDebt(){
  const amountInput = document.getElementById("addToDebtAmountInput");
  const amount = Number(amountInput?.value || 0);

  if (!amount || amount <= 0) {
    alert(t("invalidAmount"));
    return;
  }

  const now = new Date();
  const formattedDate =
    String(now.getDate()).padStart(2, "0") + "." +
    String(now.getMonth() + 1).padStart(2, "0") + "." +
    now.getFullYear() + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0");

  const payload = {
    client: addDebtTargetClient,
    phone: addDebtTargetPhone,
    amount: amount,
    seller: currentSeller,
    mode: "append",
    targetRow: addDebtTargetRow,
    noteText: `Долг суммирован: +${amount} (${formattedDate})`
  };

  try {
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.success) {
      closeAddToDebtModal();
      showToast(`✅ <b>${t("addToDebtSuccess")}</b><br>💰 +${amount} ${t("somoni")}`, "append");
      loadDebts();
    } else {

    }
  } catch (e) {
    console.error(e);
    showToast(`❌ ${t("errorSaveToast")}`, "error");
  }
}

  historyContent.innerHTML = "";
  historyLoader.style.display = "block";

  fetch(SCRIPT_URL+"?history="+encodeURIComponent(name))
  .then(res=>res.json())
  .then(data=>{
    historyLoader.style.display = "none";
    let html = "";
    if(data.history && data.history.length>0){
      data.history.forEach(h=>{
        html += `📅 ${h.date}<br>💰 ${h.amount} ${t("somoni")}<br>👤 ${h.seller}<hr>`;
      });
    } else {
      html = t("noPayments");
    }
    historyContent.innerHTML = html;
  });
}

function closeHistory(){
  historyModal.style.display = "none";
}

function openExportMenu(){
  exportModal.style.display = "flex";
}

function closeExportMenu(){
  exportModal.style.display = "none";
}

function formatReportDate(dateStr){
  if(!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return new Intl.DateTimeFormat(currentLanguage === "tj" ? "tg-TJ" : "ru-RU").format(d);
}

function getTodayFormatted(){
  return new Intl.DateTimeFormat(currentLanguage === "tj" ? "tg-TJ" : "ru-RU", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  }).format(new Date());
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getDebtStatusKey(d){
  const remainder = Number(d.remainder || 0);
  const paid = Number(d.paid || 0);

  if (remainder <= 0) return "statusClosed";
  if (d.isOverdue) return "statusOverdue";
  if (d.isPartial || paid > 0) return "statusPartial";
  return "statusActive";
}

function getDebtStatusClass(statusKey){
  if (statusKey === "statusOverdue") return "pdf-status-overdue";
  if (statusKey === "statusPartial") return "pdf-status-partial";
  if (statusKey === "statusClosed") return "pdf-status-closed";
  return "pdf-status-active";
}

function getFilteredDebtsForExport(type){
  let list = [...allDebts];

  if(type === "overdue"){
    list = list.filter(d => getDebtStatusKey(d) === "statusOverdue");
  }

  if(type === "month"){
    const selectedMonth = document.getElementById("exportMonth").value;
    if(!selectedMonth){
      alert(t("exportNoMonth"));
      return null;
    }

    list = list.filter(d => (d.dueDate || "").startsWith(selectedMonth));
  }

  return list;
}

function getReportTitle(type){
  if(type === "month"){
    const selectedMonth = document.getElementById("exportMonth").value || "";
    return t("reportTitleMonth", { month: selectedMonth });
  }
  if(type === "overdue") return t("reportTitleOverdue");
  return t("reportTitleAll");
}

function getPdfFileName(type){
  if(type === "month") return `${t("pdfFileMonth")}.pdf`;
  if(type === "overdue") return `${t("pdfFileOverdue")}.pdf`;
  return `${t("pdfFileAll")}.pdf`;
}

function buildPdfHtml(type, debts){
  const rows = debts.map((d, index) => {
    const statusKey = getDebtStatusKey(d);

    return `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHtml(d.client || "")}</td>
        <td>${escapeHtml(d.phone || "")}</td>
        <td>${escapeHtml(formatReportDate(d.dueDate || ""))}</td>
        <td>${escapeHtml(d.total || 0)} ${escapeHtml(t("somoni"))}</td>
        <td>${escapeHtml(d.paid || 0)} ${escapeHtml(t("somoni"))}</td>
        <td>${escapeHtml(d.remainder || 0)} ${escapeHtml(t("somoni"))}</td>
        <td class="${getDebtStatusClass(statusKey)}">${escapeHtml(t(statusKey))}</td>
      </tr>
    `;
  }).join("");

  return `
    <div class="pdf-report" id="pdfReportTemp">
      <h1>${escapeHtml(getReportTitle(type))}</h1>

      <div class="pdf-meta">
        <div><b>${escapeHtml(t("reportDate"))}:</b> ${escapeHtml(getTodayFormatted())}</div>
        <div><b>${escapeHtml(t("reportSeller"))}:</b> ${escapeHtml(currentSeller || "-")}</div>
        <div><b>${escapeHtml(t("reportLanguage"))}:</b> ${escapeHtml(currentLanguage.toUpperCase())}</div>
      </div>

      <table class="pdf-table">
        <thead>
          <tr>
            <th>№</th>
            <th>${escapeHtml(t("clientPlaceholder"))}</th>
            <th>${escapeHtml(t("phonePlaceholder"))}</th>
            <th>${escapeHtml(t("choosePayDate"))}</th>
            <th>${escapeHtml(t("debtAmount"))}</th>
            <th>${escapeHtml(t("paidAmount"))}</th>
            <th>${escapeHtml(t("remainder"))}</th>
            <th>${escapeHtml(t("statusColumn"))}</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
  `;
}

function exportPdf(type){
  const debts = getFilteredDebtsForExport(type);
  if (debts === null) return;

  if (!debts.length){
    alert(t("exportNoData"));
    return;
  }

  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "0";
  wrapper.style.top = "0";
  wrapper.style.width = "1120px";
  wrapper.style.background = "#fff";
  wrapper.style.zIndex = "9999";
  wrapper.style.opacity = "0.01";
  wrapper.style.pointerEvents = "none";

  wrapper.innerHTML = buildPdfHtml(type, debts);
  document.body.appendChild(wrapper);

  const reportElement = wrapper.querySelector("#pdfReportTemp");

  setTimeout(() => {
    html2pdf()
      .set({
        margin: [6, 6, 6, 6],
        filename: getPdfFileName(type),
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff"
        },
        jsPDF: {
          unit: "mm",
          format: "a4",
          orientation: "landscape"
        },
        pagebreak: {
          mode: ["css", "legacy"]
        }
      })
      .from(reportElement)
      .save()
      .then(() => {
        wrapper.remove();
        closeExportMenu();
      })
      .catch((err) => {
        console.error("PDF export error:", err);
        wrapper.remove();
      });
  }, 150);
}

  document.body.style.transition="0.3s";

  setTimeout(()=>{

<script>
async function forceAppUpdate() {
  try {
    showToast(`🔄 ${t("updatingToast")}`, "success");

    if ("serviceWorker" in navigator) {
      const registration = await navigator.serviceWorker.getRegistration();

      if (registration) {
        await registration.update();

        if (registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }
      }
    }

    setTimeout(() => {
      window.location.reload();
    }, 700);

  } catch (e) {
    console.error("Ошибка обновления:", e);
    showToast(`❌ ${t("updateFailedToast")}`, "error");
  }
}
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const registration = await navigator.serviceWorker.register("./sw.js");
      console.log("Service Worker зарегистрирован");

      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            showToast("🔄 Доступно обновление приложения", "success");
          }
        });
      });

      if (registration.waiting) {
        registration.waiting.postMessage({ type: "SKIP_WAITING" });
      }

    } catch (err) {
      console.log("Ошибка Service Worker:", err);
    }
  });

  navigator.serviceWorker.addEventListener("controllerchange", () => {
    window.location.reload();
  });
}
</script>
