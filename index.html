<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Долги магазина</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

.container {
  max-width: 420px;
  margin: 40px auto;
  background: #ffffff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #2b7cff;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #1f63cc;
}

#status {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>Добавить долг</h2>

  <form id="debtForm">
    <input type="text" id="client" placeholder="Имя клиента" required>
    <input type="text" id="phone" placeholder="Телефон" required>
    <input type="number" id="amount" placeholder="Сумма (сомони)" required>
    <input type="date" id="dueDate" required>
    <button type="submit">Сохранить</button>
  </form>

  <div id="status"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMyyJ88z19Em8v9ziLErIfT_neZilyHo5Ab-qX7jURWYpyQc8-NYWNJbRw4uAdNLip5g/exec";

document.getElementById("debtForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    client: document.getElementById("client").value,
    phone: document.getElementById("phone").value,
    amount: document.getElementById("amount").value,
    dueDate: document.getElementById("dueDate").value
  };

  document.getElementById("status").innerHTML = "⏳ Отправка...";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    document.getElementById("status").innerHTML = "✅ Сохранено!";
    document.getElementById("debtForm").reset();
  })
  .catch(error => {
    document.getElementById("status").innerHTML = "❌ Ошибка отправки!";
  });
});
</script>

</body>
</html>
