<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.header{background:#000;color:white;text-align:center;padding:14px;position:relative;}
.logout-btn{position:absolute;right:12px;top:12px;width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.login{position:fixed;inset:0;background:#000;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.login img{width:120px;margin-bottom:20px;}
.container{padding:12px;}
.card{background:white;padding:14px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.07);font-size:14px;}
.overdue{background:#ffe5e5;border-left:5px solid red;}
.warning{background:#fff8e1;border-left:5px solid orange;}
button{width:100%;padding:10px;border:none;border-radius:10px;margin-top:6px;font-weight:bold;font-size:14px;}
.save-btn{background:#28a745;color:white;}
.save-btn:disabled{opacity:0.5;}
.pay-btn{background:#28a745;color:white;}
.action-row{display:flex;gap:6px;margin-top:6px;}
.action-row a{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:13px;text-decoration:none;color:white;}
.call-btn{background:#007bff;}
.wa-btn{background:#25D366;}
input{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ddd;font-size:14px;}
.search-box{background:white;padding:10px;border-radius:12px;margin-bottom:12px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;}
.modal-content{background:white;padding:20px;border-radius:14px;width:90%;max-width:350px;max-height:80vh;overflow:auto;}
.loader{animation:pulse 1s infinite;text-align:center;font-weight:bold;margin-top:10px;}
@keyframes pulse{0%{opacity:0.4;}50%{opacity:1;}100%{opacity:0.4;}}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
<img src="logo.png">
<h2>Вход</h2>
<input type="tel" inputmode="numeric" id="pinInput" placeholder="Введите PIN">
<button onclick="login()">Войти</button>
</div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none;">
<h2>Fashion&StyleLife - Долги</h2>
<div id="userInfo"></div>
<button class="logout-btn" onclick="logout()">🚪</button>
</div>

<div class="container" id="appContent" style="display:none;">

<div id="statsBox"></div>

<h3>Добавить долг</h3>
<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон" maxlength="9" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="tel" inputmode="numeric" placeholder="Сумма">
<label style="color:red;font-weight:bold;">Выберите дату оплаты</label>
<input id="dueDate" type="date">
<button id="saveBtn" class="save-btn" disabled onclick="addDebt()">Сохранить</button>
<div id="saveLoader" class="loader" style="display:none;">⏳ Сохранение...</div>

<div class="search-box">
<input id="searchInput" placeholder="🔍 Поиск по имени или номеру">
</div>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<!-- МОДАЛКА ОПЛАТЫ -->
<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Оплата долга</h3>
<div id="paymentInfo"></div>
<input type="tel" inputmode="numeric" id="paymentAmount" placeholder="Введите сумму">
<button class="pay-btn" onclick="confirmPayment()">Подтвердить оплату</button>
<button onclick="closePayment()" style="background:#ccc;color:black;">Отмена</button>
<div id="paymentLoader" class="loader" style="display:none;">⏳ Обработка...</div>
</div>
</div>

<!-- МОДАЛКА ВЫХОДА -->
<div class="modal" id="logoutModal">
<div class="modal-content" style="text-align:center;">
<h3>Подтверждение выхода</h3>
<p>Вы действительно хотите выйти?</p>
<button onclick="confirmLogout()" style="background:#dc3545;color:white;">Выйти</button>
<button onclick="closeLogout()" style="background:#ccc;color:black;">Отмена</button>
</div>
</div>

<!-- МОДАЛКА ИСТОРИИ -->
<div class="modal" id="historyModal">
<div class="modal-content">
<h3>История оплат</h3>
<div id="historyLoader" class="loader" style="display:none;">⏳ Загрузка...</div>
<div id="historyContent"></div>
<button onclick="closeHistory()">Закрыть</button>
</div>
</div>

<script>

const VERSION="17.0 FINAL";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxE_rK0JBj7zT4Y385JO9WE_60mUd0hYG60kCYCavV-GDtrUtdvb6sklbJEtnBpGdQzyg/exec";

const USERS={
"1111":"Умед",
"0000":"Тахмина",
"5301":"Гульчехра",
"1602":"Махфират"
};

let currentSeller=null;
let allDebts=[];
let currentRow=null;
let currentRemainder=0;

function login(){
let pin=pinInput.value.trim();
if(!USERS[pin]){alert("Неверный PIN");return;}
currentSeller=USERS[pin];
sessionStorage.setItem("seller",currentSeller);
openApp();
}

function openApp(){
loginScreen.style.display="none";
mainHeader.style.display="block";
appContent.style.display="block";
userInfo.innerHTML="👤 "+currentSeller+" | Версия: v"+VERSION;
loadDebts();
}

window.onload=function(){
let saved=sessionStorage.getItem("seller");
if(saved){currentSeller=saved;openApp();}
};

function logout(){logoutModal.style.display="flex";}
function closeLogout(){logoutModal.style.display="none";}
function confirmLogout(){sessionStorage.removeItem("seller");location.reload();}

function validateForm(){
saveBtn.disabled = !(client.value && phone.value.length===9 && amount.value && dueDate.value);
}
client.addEventListener("input",validateForm);
phone.addEventListener("input",validateForm);
amount.addEventListener("input",validateForm);
dueDate.addEventListener("input",validateForm);

function addDebt(){
saveLoader.style.display="block";
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
}).then(()=>{
saveLoader.style.display="none";
client.value="";phone.value="";amount.value="";dueDate.value="";
saveBtn.disabled=true;
loadDebts();
});
}

function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{
allDebts=data.debts||[];
renderStats(data);
renderDebts(allDebts);
});
}

function renderStats(data){
statsBox.innerHTML=`
<div class="card">
<div onclick="toggleStats()" style="cursor:pointer;font-weight:bold;">
📊 Статистика (нажмите для раскрытия)
</div>
<div id="statsContent" style="display:none;margin-top:10px;">
Активные: ${data.activeTotal} сомони (${data.activeCount})<br>
Частично оплачено: ${data.partialTotal} сомони (${data.partialCount})<br>
Оплаченные: ${data.paidTotal} сомони (${data.paidCount})<br>
<b style="color:red;">Просроченные: ${data.overdueTotal} сомони (${data.overdueCount})</b>
</div>
</div>`;
}

function toggleStats(){
let el=document.getElementById("statsContent");
el.style.display = el.style.display==="none" ? "block" : "none";
}

function renderDebts(list){

list.sort((a,b)=>{
if(a.isOverdue && !b.isOverdue) return -1;
if(!a.isOverdue && b.isOverdue) return 1;
return new Date(a.dueDate) - new Date(b.dueDate);
});

let html="";
let today=new Date();today.setHours(0,0,0,0);

list.forEach(d=>{
let due=new Date(d.dueDate);due.setHours(0,0,0,0);
let diffDays=Math.ceil((due-today)/(1000*60*60*24));
let paidAmount=d.total-d.remainder;

let cardClass="card";
let extra="";

if(d.isOverdue||diffDays<0){
cardClass+=" overdue";
extra=`<div style="color:red;font-weight:bold;">⚠ Просрочено на ${Math.abs(diffDays)} дн.</div>`;
}else if(diffDays<=2){
cardClass+=" warning";
extra=`<div style="color:orange;">Осталось ${diffDays} дн.</div>`;
}

let waText=encodeURIComponent("Салом алейкум напоминаем вам о задолженности "+d.remainder+" сомони");
let phoneFull="992"+d.phone;

html+=`
<div class="${cardClass}">
<b>${d.client}</b> (до ${d.dueDate})<br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
${paidAmount>0?`Оплатили: ${paidAmount} сомони<br>`:""}
Остаток: <b>${d.remainder}</b> сомони
${extra}
<button class="pay-btn" onclick="openPayment(${d.row},${d.remainder})">Оплатить</button>
<div class="action-row">
<a class="call-btn" href="tel:+${phoneFull}">📞 Позвонить</a>
<a class="wa-btn" target="_blank" href="https://wa.me/${phoneFull}?text=${waText}">💬 WhatsApp</a>
</div>
<button onclick="showHistory('${d.client}')">📂 История оплат</button>
</div>`;
});

debtList.innerHTML=html||`<div class="card">Нет данных</div>`;
}

document.getElementById("searchInput").addEventListener("input",function(){
let val=this.value.toLowerCase().trim();
if(val===""){renderDebts(allDebts);return;}
let filtered=allDebts.filter(d=>d.client.toLowerCase().includes(val)||d.phone.includes(val));
renderDebts(filtered);
});

function openPayment(row,remainder){
currentRow=row;currentRemainder=remainder;
paymentAmount.value="";
paymentInfo.innerHTML="Остаток: <b>"+remainder+" сомони</b>";
paymentModal.style.display="flex";
}
function closePayment(){paymentModal.style.display="none";}
function confirmPayment(){
let amount=Number(paymentAmount.value);
if(amount<=0||amount>currentRemainder){alert("Неверная сумма");return;}
paymentLoader.style.display="block";
fetch(SCRIPT_URL+"?paid="+currentRow+"&amount="+amount+"&seller="+currentSeller)
.then(()=>{paymentLoader.style.display="none";paymentModal.style.display="none";loadDebts();});
}

function showHistory(name){
historyModal.style.display="flex";
historyLoader.style.display="block";
historyContent.innerHTML="";
fetch(SCRIPT_URL+"?history="+encodeURIComponent(name))
.then(res=>res.json())
.then(data=>{
historyLoader.style.display="none";
let html="";
if(data.history&&data.history.length>0){
data.history.forEach(h=>{
html+=`📅 ${h.date}<br>💰 ${h.amount} сомони<br>👤 ${h.seller}<hr>`;
});
}else{html="Оплат пока нет";}
historyContent.innerHTML=html;
});
}

function closeHistory(){historyModal.style.display="none";}

</script>
</body>
</html>
