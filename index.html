<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

/* HEADER */
.header{
background:#000;
color:white;
text-align:center;
padding:14px;
position:relative;
}

.logout-btn{
position:absolute;
right:10px;
top:10px;
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

/* LOGIN */
.login{
position:fixed;
inset:0;
background:#000;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.login img{
width:120px;
margin-bottom:20px;
}

/* CONTENT */
.container{padding:12px;}

.card{
background:white;
padding:14px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.07);
font-size:14px;
}

.overdue{background:#ffe5e5;border-left:5px solid red;}
.warning{background:#fff8e1;border-left:5px solid orange;}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:8px;
font-weight:bold;
font-size:14px;
}

.save-btn{background:#28a745;color:white;}
.save-btn:disabled{opacity:0.5;}
.pay-btn{background:#28a745;color:white;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

label.date-label{color:red;font-weight:bold;}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:14px;
width:90%;
max-width:320px;
text-align:center;
}

.fade-out{
animation: fadeOut 0.4s forwards;
}

@keyframes fadeOut{
from{opacity:1;}
to{opacity:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
<img src="logo.png" alt="Logo">
<h2>Вход</h2>
<input type="tel" inputmode="numeric" pattern="[0-9]*" id="pinInput" placeholder="Введите PIN">
<button onclick="login()">Войти</button>
</div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none;">
<h2>Fashion&StyleLife - Долги</h2>
<div id="userInfo"></div>
<button class="logout-btn" onclick="logout()">Выйти</button>
</div>

<!-- CONTENT -->
<div class="container" id="appContent" style="display:none;">

<div id="statsBox"></div>

<h3>Добавить долг</h3>

<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон" maxlength="9"
inputmode="numeric" pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="tel" inputmode="numeric" pattern="[0-9]*" placeholder="Сумма">

<label class="date-label">Выберите дату оплаты</label>
<input id="dueDate" type="date">

<button id="saveBtn" class="save-btn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<!-- МОДАЛКА ОПЛАТЫ -->
<div class="modal" id="paymentModal">
<div class="modal-content">
<h3>Введите сумму оплаты</h3>
<input type="tel" inputmode="numeric" pattern="[0-9]*" id="partialAmount">
<button class="pay-btn" onclick="confirmPayment()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- МОДАЛКА ЗАГРУЗКИ -->
<div class="modal" id="loadingModal">
<div class="modal-content">
⏳ Идет сохранение записи...
</div>
</div>

<!-- МОДАЛКА ВЫХОДА -->
<div class="modal" id="logoutModal">
<div class="modal-content">
<h3>Выйти из системы?</h3>
<button style="background:red;color:white;" onclick="confirmLogout()">Да, выйти</button>
<button onclick="closeLogout()">Отмена</button>
</div>
</div>

<script>

const VERSION="12.5";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwcJEZEKu8wATiUimWszvykTrPK_8fLixlnMNZV61Rqc3Ij8o634rRz-vOmVBcHFZmQnQ/exec";

const USERS={
"1111":"Умед",
"0000":"Тахмина",
"5301":"Гульчехра"
};

let currentSeller=null;
let currentRow=null;
let currentRemainder=0;

// LOGIN
function login(){
let pin=pinInput.value.trim();
if(!USERS[pin]){alert("Неверный PIN");return;}
currentSeller=USERS[pin];
sessionStorage.setItem("seller",currentSeller);
openApp();
}

function openApp(){
loginScreen.style.display="none";
mainHeader.style.display="block";
appContent.style.display="block";
userInfo.innerHTML="👤 "+currentSeller+" | Версия: v"+VERSION;
loadDebts();
}

window.onload=function(){
let saved=sessionStorage.getItem("seller");
if(saved){currentSeller=saved;openApp();}
};

// LOGOUT
function logout(){
logoutModal.style.display="flex";
}

function closeLogout(){
logoutModal.style.display="none";
}

function confirmLogout(){
logoutModal.style.display="none";
appContent.classList.add("fade-out");
mainHeader.classList.add("fade-out");

setTimeout(()=>{
sessionStorage.removeItem("seller");
appContent.style.display="none";
mainHeader.style.display="none";
loginScreen.style.display="flex";
appContent.classList.remove("fade-out");
mainHeader.classList.remove("fade-out");
pinInput.value="";
},400);
}

// VALIDATION
function validateForm(){
saveBtn.disabled = !(client.value && phone.value.length===9 && amount.value && dueDate.value);
}

client.addEventListener("input",validateForm);
phone.addEventListener("input",validateForm);
amount.addEventListener("input",validateForm);
dueDate.addEventListener("input",validateForm);

// ADD
function addDebt(){
loadingModal.style.display="flex";
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
}).then(()=>location.reload());
}

// LOAD
function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

// ===== СТАТИСТИКА =====
statsBox.innerHTML=`
<div class="card">
<div onclick="toggleStats()" style="cursor:pointer;font-weight:bold;">
📊 Статистика
</div>
<div id="statsContent" style="display:none;margin-top:8px;">
Активные долги: ${data.activeTotal} сомони от ${data.activeCount} клиентов<br>
Оплаченные долги: ${data.paidTotal} сомони от ${data.paidCount} клиентов<br><br>
<b style="color:red;">
Просроченные долги: ${data.overdueTotal} сомони от ${data.overdueCount} клиента
</b>
</div>
</div>
`;

let debts=data.debts;

debts.sort((a,b)=>{
if(a.isOverdue && !b.isOverdue) return -1;
if(!a.isOverdue && b.isOverdue) return 1;
return new Date(a.dueDate) - new Date(b.dueDate);
});

let html="";
let today=new Date(); today.setHours(0,0,0,0);

debts.forEach(d=>{
let due=new Date(d.dueDate); due.setHours(0,0,0,0);
let diffDays=Math.ceil((due - today)/(1000*60*60*24));

let cls="";
let extra="";

if(d.isOverdue){
cls="overdue";
let days=Math.abs(diffDays);
extra=`<div style="color:red;">⚠ Просрочено на ${days} дн.</div>`;
}
else if(diffDays<=2 && diffDays>=0){
cls="warning";
extra=`<div style="color:orange;">Осталось ${diffDays} дн.</div>`;
}

html+=`
<div class="card ${cls}">
<b>${d.client}</b> (до ${d.dueDate})<br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
Остаток: <b>${d.remainder}</b> сомони
${extra}
<button class="pay-btn" onclick="openPayment(${d.row},${d.remainder})">Оплатить</button>
</div>
`;
});

debtList.innerHTML=html;
});
}

function toggleStats(){
let el=document.getElementById("statsContent");
el.style.display = el.style.display==="none" ? "block" : "none";
}

// PAYMENT
function openPayment(row,remainder){
currentRow=row;
currentRemainder=remainder;
paymentModal.style.display="flex";
}

function closeModal(){
paymentModal.style.display="none";
}

function confirmPayment(){
loadingModal.style.display="flex";
let pay=Number(partialAmount.value);
fetch(SCRIPT_URL+"?paid="+currentRow+"&amount="+pay+"&seller="+currentSeller)
.then(()=>location.reload());
}

</script>
</body>
</html>
