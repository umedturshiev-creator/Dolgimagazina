<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}

.header{
background:#000;
color:white;
text-align:center;
padding:14px;
position:relative;
}

.logout-btn{
position:absolute;
right:12px;
top:12px;
width:34px;
height:34px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:16px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.logout-btn:hover{
background:rgba(255,255,255,0.3);
transform:scale(1.05);
}

.login{
position:fixed;
inset:0;
background:#000;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.login img{
width:120px;
margin-bottom:20px;
}

.container{padding:12px;}

.card{
background:white;
padding:14px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.07);
font-size:14px;
}

.overdue{background:#ffe5e5;border-left:5px solid red;}
.warning{background:#fff8e1;border-left:5px solid orange;}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:6px;
font-weight:bold;
font-size:14px;
}

.save-btn{background:#28a745;color:white;}
.save-btn:disabled{opacity:0.5;}
.pay-btn{background:#28a745;color:white;}

.action-row{
display:flex;
gap:6px;
margin-top:6px;
}

.action-row a{
flex:1;
text-align:center;
padding:8px;
border-radius:8px;
font-size:13px;
text-decoration:none;
color:white;
}

.call-btn{background:#007bff;}
.wa-btn{background:#25D366;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.search-box{
background:white;
padding:10px;
border-radius:12px;
margin-bottom:12px;
}

label.date-label{color:red;font-weight:bold;}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:14px;
width:90%;
max-width:350px;
text-align:left;
max-height:70vh;
overflow:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
<img src="logo.png" alt="Logo">
<h2>Вход</h2>
<input type="tel" inputmode="numeric" id="pinInput" placeholder="Введите PIN">
<button onclick="login()">Войти</button>
</div>

<!-- HEADER -->
<div class="header" id="mainHeader" style="display:none;">
<h2>Fashion&StyleLife - Долги</h2>
<div id="userInfo"></div>
<button class="logout-btn" onclick="logout()" title="Выйти">🚪</button>
</div>

<div class="container" id="appContent" style="display:none;">

<div id="statsBox"></div>

<!-- ПОИСК -->
<div class="search-box">
<input id="searchInput" placeholder="🔍 Поиск по имени или номеру">
</div>

<h3>Добавить долг</h3>

<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон" maxlength="9"
inputmode="numeric"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="tel" inputmode="numeric" placeholder="Сумма">

<label class="date-label">Выберите дату оплаты</label>
<input id="dueDate" type="date">

<button id="saveBtn" class="save-btn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<!-- ИСТОРИЯ -->
<div class="modal" id="historyModal">
<div class="modal-content">
<h3>История оплат</h3>
<div id="historyContent"></div>
<button onclick="closeHistory()">Закрыть</button>
</div>
</div>

<script>

const VERSION="14.0";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxAQMrSq8RtxwsPCGavwQLOT2ir5H0XGC3GkdWFb1vtBGOtbbJy6i8483dmhsl0SgSflg/exec";

const USERS={"1111":"Умед","0000":"Тахмина","5301":"Гульчехра","1602":"Махфират"};

let currentSeller=null;
let allDebts=[];

function login(){
let pin=pinInput.value.trim();
if(!USERS[pin]){alert("Неверный PIN");return;}
currentSeller=USERS[pin];
sessionStorage.setItem("seller",currentSeller);
openApp();
}

function openApp(){
loginScreen.style.display="none";
mainHeader.style.display="block";
appContent.style.display="block";
userInfo.innerHTML="👤 "+currentSeller+" | Версия: v"+VERSION;
loadDebts();
}

window.onload=function(){
let saved=sessionStorage.getItem("seller");
if(saved){currentSeller=saved;openApp();}
};

function validateForm(){
saveBtn.disabled = !(client.value && phone.value.length===9 && amount.value && dueDate.value);
}
client.addEventListener("input",validateForm);
phone.addEventListener("input",validateForm);
amount.addEventListener("input",validateForm);
dueDate.addEventListener("input",validateForm);

function addDebt(){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
}).then(()=>location.reload());
}

function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

data=data||{};
allDebts=data.debts||[];

let html="";
allDebts.forEach(d=>{

let waText=encodeURIComponent("Салом алейкум напоминаем вам о задолженности "+d.remainder+" сомони");
let phoneFull="992"+d.phone;

html+=`
<div class="card">
<b>${d.client}</b> (до ${d.dueDate})<br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
Остаток: <b>${d.remainder}</b> сомони

<button class="pay-btn" onclick="openPayment(${d.row},${d.remainder})">Оплатить</button>

<div class="action-row">
<a class="call-btn" href="tel:+${phoneFull}">📞 Позвонить</a>
<a class="wa-btn" target="_blank"
href="https://wa.me/${phoneFull}?text=${waText}">
💬 WhatsApp
</a>
</div>

<button onclick="showHistory('${d.client}')">📂 История оплат</button>

</div>
`;
});

debtList.innerHTML=html;

});
}

document.getElementById("searchInput").addEventListener("input",function(){
let val=this.value.toLowerCase();
let filtered=allDebts.filter(d=>
d.client.toLowerCase().includes(val) ||
d.phone.includes(val)
);
renderFiltered(filtered);
});

function renderFiltered(list){
let html="";
list.forEach(d=>{
html+=`<div class="card"><b>${d.client}</b> (${d.phone})</div>`;
});
debtList.innerHTML=html;
}

function showHistory(name){
fetch(SCRIPT_URL+"?history="+name)
.then(res=>res.json())
.then(data=>{
let html="";
if(data.history && data.history.length>0){
data.history.forEach(h=>{
html+=`<div>${h.date} — ${h.amount} сомони (${h.seller})</div>`;
});
}else{
html="Нет оплат";
}
historyContent.innerHTML=html;
historyModal.style.display="flex";
});
}

function closeHistory(){
historyModal.style.display="none";
}

</script>
</body>
</html>
