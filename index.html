}

.lang-btn.active{

}

.logout-btn{

  height:40px;
  margin-top:0;

  background:rgba(255,255,255,0.15);

  font-size:16px;

  background:rgba(255,255,255,0.15);

  font-size:13px;

  align-items:center;
  justify-content:center;

  color:#000;

.pdf-report h1{

.pdf-meta{
  margin-bottom:18px;
  font-size:14px;

.pdf-table{
  width:100%;

<div class="container" id="appContent" style="display:none;">

function t(key, vars = {}) {
  let text = translations[currentLanguage]?.[key] || translations.ru[key] || key;
  Object.keys(vars).forEach(k => {
    text = text.replaceAll(`{${k}}`, vars[k]);
  });
  return text;
}

function setLanguage(lang){
  currentLanguage = lang;
  localStorage.setItem("lang", lang);

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
  });

  applyTranslations();
}

function applyTranslations(){
  document.documentElement.lang = currentLanguage;

  const loginTitle = document.querySelector("#loginScreen h2");
  const loginBtn = document.querySelector('#loginScreen button[onclick="login()"]');
  const pinInputEl = document.getElementById("pinInput");

  if (loginTitle) loginTitle.textContent = t("loginTitle");
  if (loginBtn) loginBtn.textContent = t("loginBtn");
  if (pinInputEl) pinInputEl.placeholder = t("pinPlaceholder");

  const mainTitle = document.querySelector(".header-center h2");
  if (mainTitle) mainTitle.textContent = t("appTitle");

  const logoutTitle = document.querySelector("#logoutModal h3");
  const logoutText = document.querySelector("#logoutModal p");
  const logoutBtns = document.querySelectorAll("#logoutModal button");
  if (logoutTitle) logoutTitle.textContent = t("logoutTitle");
  if (logoutText) logoutText.textContent = t("logoutText");
  if (logoutBtns[0]) logoutBtns[0].textContent = t("logoutBtn");
  if (logoutBtns[1]) logoutBtns[1].textContent = t("cancelBtn");

  const appHeadings = document.querySelectorAll("#appContent h3");
  if (appHeadings[0]) appHeadings[0].textContent = t("addDebt");
  if (appHeadings[1]) appHeadings[1].textContent = t("debtorsList");

  const clientEl = document.getElementById("client");
  const phoneEl = document.getElementById("phone");
  const amountEl = document.getElementById("amount");
  const dueLabel = document.querySelector('label[style*="color:red"]');
  const saveBtnEl = document.getElementById("saveBtn");
  const saveLoaderEl = document.getElementById("saveLoader");
  const searchEl = document.getElementById("searchInput");

  if (clientEl) clientEl.placeholder = t("clientPlaceholder");
  if (phoneEl) phoneEl.placeholder = t("phonePlaceholder");
  if (amountEl) amountEl.placeholder = t("amountPlaceholder");
  if (dueLabel) dueLabel.textContent = t("choosePayDate");
  if (saveBtnEl) saveBtnEl.textContent = t("saveBtn");
  if (saveLoaderEl) saveLoaderEl.textContent = t("saveLoader");
  if (searchEl) searchEl.placeholder = t("searchPlaceholder");

  const paymentTitle = document.querySelector("#paymentModal h3");
  const paymentInput = document.getElementById("paymentAmount");
  const paymentBtns = document.querySelectorAll("#paymentModal button");
  const paymentLoaderEl = document.getElementById("paymentLoader");

  if (paymentTitle) paymentTitle.textContent = t("paymentTitle");
  if (paymentInput) paymentInput.placeholder = t("paymentPlaceholder");
  if (paymentBtns[0]) paymentBtns[0].textContent = t("confirmPayment");
  if (paymentBtns[1]) paymentBtns[1].textContent = t("cancelBtn");
  if (paymentLoaderEl) paymentLoaderEl.textContent = t("paymentLoader");

  const historyTitle = document.querySelector("#historyModal h3");
  const historyLoaderEl = document.getElementById("historyLoader");
  const historyCloseBtn = document.querySelector('#historyModal button[onclick="closeHistory()"]');

  if (historyTitle) historyTitle.textContent = t("historyTitle");
  if (historyLoaderEl) historyLoaderEl.textContent = t("historyLoader");
  if (historyCloseBtn) historyCloseBtn.textContent = t("closeBtn");

  if (currentSeller) {
    userInfo.innerHTML = t("userInfo", { name: currentSeller, version: VERSION });
  }

const exportTitleEl = document.getElementById("exportTitle");
const exportAllBtnEl = document.getElementById("exportAllBtn");
const exportMonthBtnEl = document.getElementById("exportMonthBtn");
const exportOverdueBtnEl = document.getElementById("exportOverdueBtn");

const exportCancelBtnEl = document.getElementById("exportCancelBtn");

if (exportMonthBtnEl) exportMonthBtnEl.textContent = t("exportMonth");
if (exportOverdueBtnEl) exportOverdueBtnEl.textContent = t("exportOverdue");
if (exportMonthLabelEl) exportMonthLabelEl.textContent = t("exportChooseMonth");
if (exportCancelBtnEl) exportCancelBtnEl.textContent = t("cancelBtn");
  
  renderStats(lastStatsData || {});
  renderDebts([...allDebts]);
}

/* ---------- LOGIN ---------- */

function login(){
  let pin = pinInput.value.trim();
  if(!USERS[pin]){
    alert(t("wrongPin"));
    return;
  }
  currentSeller = USERS[pin];
  sessionStorage.setItem("seller", currentSeller);
  openApp();
}

function openApp(){
  loginScreen.style.display = "none";
  mainHeader.style.display = "flex";
  appContent.style.display = "block";
  userInfo.innerHTML = t("userInfo", { name: currentSeller, version: VERSION });
  loadDebts();
}

window.onload = function(){
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLanguage);
  });

  let saved = sessionStorage.getItem("seller");
  if(saved){
    currentSeller = saved;
    openApp();
  }

  applyTranslations();
};

function logout(){
logoutModal.style.display="flex";
}

/* ---------- ДОБАВЛЕНИЕ ---------- */

function validateForm(){
saveBtn.disabled = !(client.value && phone.value.length===9 && amount.value && dueDate.value);
}
client.addEventListener("input",validateForm);
phone.addEventListener("input",validateForm);
amount.addEventListener("input",validateForm);
dueDate.addEventListener("input",validateForm);

function addDebt(){

if(saveBtn.disabled) return;

saveLoader.style.display="block";
saveBtn.disabled=true;

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
})
.then(()=>{
saveLoader.style.display="none";
client.value="";
phone.value="";
amount.value="";
dueDate.value="";
saveBtn.disabled=true;
loadDebts();
});
}

/* ---------- ЗАГРУЗКА ---------- */

function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{
data=data||{};
allDebts=data.debts||[];
renderStats(data);
renderDebts(allDebts);
});
}

/* ---------- СТАТИСТИКА ---------- */

function renderStats(data){
  lastStatsData = data || {};

  let activeTotal = Number(data.activeTotal || 0);
  let paidTotal = Number(data.paidTotal || 0);
  let overdueTotal = Number(data.overdueTotal || 0);
  let partialTotal = Number(data.partialTotal || 0);

  let activeCount = Number(data.activeCount || 0);
  let paidCount = Number(data.paidCount || 0);
  let overdueCount = Number(data.overdueCount || 0);
  let partialCount = Number(data.partialCount || 0);

  let totalGiven = activeTotal + partialTotal + paidTotal;

  statsBox.innerHTML = `
  <div class="card">
    <div onclick="toggleStats()" style="cursor:pointer;font-weight:bold;">
      📊 ${t("statsTitle")}
    </div>

<div id="statsContent" style="display:none;margin-top:10px;">
  💰 <b>${t("totalGiven")}:</b> ${totalGiven} ${t("somoni")}<br><br>
  📉 ${t("activeDebts")}: ${activeTotal} ${t("somoni")} ${t("fromWord")} ${activeCount} ${t("clients")}<br>
  💸 ${t("alreadyPaid")}: ${partialTotal} ${t("somoni")} ${t("fromWord")} ${partialCount} ${t("clients")}<br>
  ✅ ${t("fullyClosed")}: ${paidTotal} ${t("somoni")} ${t("fromWord")} ${paidCount} ${t("clients")}<br><br>
  <b style="color:red;">
    🔴 ${t("overdueLeft")}: ${overdueTotal} ${t("somoni")} ${t("fromWord")} ${overdueCount} ${t("clients")}
  </b>
</div>
  </div>
  `;
}

function toggleStats(){
  let el = document.getElementById("statsContent");
  if (!el) return;

  if (el.style.display === "none" || el.style.display === "") {
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}

/* ---------- ОТРИСОВКА ---------- */

function renderDebts(list){
  list.sort((a,b)=>{
    if(a.isOverdue && !b.isOverdue) return -1;
    if(!a.isOverdue && b.isOverdue) return 1;
    return new Date(a.dueDate||0) - new Date(b.dueDate||0);
  });

  let html = "";
  let today = new Date();
  today.setHours(0,0,0,0);

  list.forEach(d=>{
    let due = new Date(d.dueDate);
    due.setHours(0,0,0,0);
    let diffDays = Math.ceil((due-today)/(1000*60*60*24));

    let cardClass = "card";
    let extra = "";

    if(d.isOverdue || diffDays < 0){
      cardClass += " overdue";
      extra = `<div style="color:red;font-weight:bold;">${t("overdueDays",{days:Math.abs(diffDays)})}</div>`;
    } else if(diffDays <= 2){
      cardClass += " warning";
      extra = `<div style="color:orange;">${t("leftDays",{days:diffDays})}</div>`;
    }

    let waText = encodeURIComponent(t("waReminder", { amount: d.remainder }));
    let phoneFull = "992" + d.phone;

    html += `
    <div class="${cardClass}">
      <b>${d.client}</b> (${t("dueDateText",{date:d.dueDate})})<br>
      ${t("phonePlaceholder")}: ${d.phone}<br>
      ${t("debtAmount")}: ${d.total} ${t("somoni")}<br>
      ${t("paidAmount")}: ${d.paid || 0} ${t("somoni")}<br>
      ${t("lastPayment")}: ${d.partialPayment || 0} ${t("somoni")}<br>
      ${t("remainder")}: <b>${d.remainder}</b> ${t("somoni")}<br>
      ${d.isPartial ? `<div style="color:#28a745;font-weight:bold;">${t("hasPayment")}</div>` : ""}
      ${extra}

      <button class="pay-btn" onclick="openPayment(${d.row},${d.remainder})">
        ${t("payBtn")}
      </button>

      <div class="action-row">
        <a class="call-btn" href="tel:+${phoneFull}">📞 ${t("callBtn")}</a>
        <a class="wa-btn" target="_blank" href="https://wa.me/${phoneFull}?text=${waText}">
          💬 ${t("whatsappBtn")}
        </a>
      </div>

      <button onclick="showHistory('${d.client}')">
        📂 ${t("historyBtn")}
      </button>
    </div>
    `;
  });

  debtList.innerHTML = html || `<div class="card">${t("noData")}</div>`;
}

/* ---------- ПОИСК ---------- */

function applySearch(){

let val = searchInput.value.toLowerCase().trim();

if(val === ""){
renderDebts([...allDebts]); // возвращаем всё
return;
}

let filtered = allDebts.filter(d => {

let nameMatch = d.client && 
d.client.toLowerCase().includes(val);

let phoneMatch = d.phone &&
d.phone.toString().includes(val);

return nameMatch || phoneMatch;

});

renderDebts(filtered);

}

// Живой поиск
searchInput.addEventListener("input", applySearch);

/* ---------- ОПЛАТА ---------- */

function openPayment(row,remainder){
  currentRow = row;
  currentRemainder = remainder;
  paymentAmount.value = "";
  paymentInfo.innerHTML = t("paymentRemainder", { amount: remainder });
  paymentModal.style.display = "flex";
}

function closePayment(){
paymentModal.style.display="none";
}

function confirmPayment(){
  let amount = Number(paymentAmount.value);
  if(!amount || amount <= 0){ alert(t("invalidAmount")); return; }
  if(amount > currentRemainder){ alert(t("amountTooBig")); return; }

  paymentLoader.style.display = "block";

  fetch(SCRIPT_URL+"?paid="+currentRow+"&amount="+amount+"&seller="+currentSeller)
  .then(()=>{
    paymentLoader.style.display = "none";
    paymentModal.style.display = "none";
    loadDebts();
  });
}

/* ---------- ИСТОРИЯ ---------- */

function showHistory(name){
  historyModal.style.display = "flex";
  historyContent.innerHTML = "";
  historyLoader.style.display = "block";

  fetch(SCRIPT_URL+"?history="+encodeURIComponent(name))
  .then(res=>res.json())
  .then(data=>{
    historyLoader.style.display = "none";
    let html = "";
    if(data.history && data.history.length>0){
      data.history.forEach(h=>{
        html += `📅 ${h.date}<br>💰 ${h.amount} ${t("somoni")}<br>👤 ${h.seller}<hr>`;
      });
    } else {
      html = t("noPayments");
    }
    historyContent.innerHTML = html;
  });
}

function closeHistory(){
  historyModal.style.display = "none";
}

function openExportMenu(){
  exportModal.style.display = "flex";
}

function closeExportMenu(){
  exportModal.style.display = "none";
}

function formatReportDate(dateStr){
  if(!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return new Intl.DateTimeFormat(currentLanguage === "tj" ? "tg-TJ" : "ru-RU").format(d);
}

function getTodayFormatted(){
  return new Intl.DateTimeFormat(currentLanguage === "tj" ? "tg-TJ" : "ru-RU", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  }).format(new Date());
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getDebtStatusKey(d){
  const remainder = Number(d.remainder || 0);
  const paid = Number(d.paid || 0);

  if (remainder <= 0) return "statusClosed";
  if (d.isOverdue) return "statusOverdue";
  if (d.isPartial || paid > 0) return "statusPartial";
  return "statusActive";
}

function getDebtStatusClass(statusKey){
  if (statusKey === "statusOverdue") return "pdf-status-overdue";
  if (statusKey === "statusPartial") return "pdf-status-partial";
  if (statusKey === "statusClosed") return "pdf-status-closed";
  return "pdf-status-active";
}

function getFilteredDebtsForExport(type){
  let list = [...allDebts];

  if(type === "overdue"){
    list = list.filter(d => getDebtStatusKey(d) === "statusOverdue");
  }

  if(type === "month"){
    const selectedMonth = document.getElementById("exportMonth").value;
    if(!selectedMonth){
      alert(t("exportNoMonth"));
      return null;
    }

    list = list.filter(d => (d.dueDate || "").startsWith(selectedMonth));
  }

  return list;
}

function getReportTitle(type){
  if(type === "month"){
    const selectedMonth = document.getElementById("exportMonth").value || "";
    return t("reportTitleMonth", { month: selectedMonth });
  }
  if(type === "overdue") return t("reportTitleOverdue");
  return t("reportTitleAll");
}

function getPdfFileName(type){
  if(type === "month") return `${t("pdfFileMonth")}.pdf`;
  if(type === "overdue") return `${t("pdfFileOverdue")}.pdf`;
  return `${t("pdfFileAll")}.pdf`;
}

function buildPdfHtml(type, debts){
  const rows = debts.map((d, index) => {
    const statusKey = getDebtStatusKey(d);

    return `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHtml(d.client || "")}</td>
        <td>${escapeHtml(d.phone || "")}</td>
        <td>${escapeHtml(formatReportDate(d.dueDate || ""))}</td>
        <td>${escapeHtml(d.total || 0)} ${escapeHtml(t("somoni"))}</td>
        <td>${escapeHtml(d.paid || 0)} ${escapeHtml(t("somoni"))}</td>
        <td>${escapeHtml(d.remainder || 0)} ${escapeHtml(t("somoni"))}</td>
        <td class="${getDebtStatusClass(statusKey)}">${escapeHtml(t(statusKey))}</td>
      </tr>
    `;
  }).join("");

  return `
    <div class="pdf-report" id="pdfReportTemp">
      <h1>${escapeHtml(getReportTitle(type))}</h1>

      <div class="pdf-meta">
        <div><b>${escapeHtml(t("reportDate"))}:</b> ${escapeHtml(getTodayFormatted())}</div>
        <div><b>${escapeHtml(t("reportSeller"))}:</b> ${escapeHtml(currentSeller || "-")}</div>
        <div><b>${escapeHtml(t("reportLanguage"))}:</b> ${escapeHtml(currentLanguage.toUpperCase())}</div>
      </div>

      <table class="pdf-table">
        <thead>
          <tr>
            <th>№</th>
            <th>${escapeHtml(t("clientPlaceholder"))}</th>
            <th>${escapeHtml(t("phonePlaceholder"))}</th>
            <th>${escapeHtml(t("choosePayDate"))}</th>
            <th>${escapeHtml(t("debtAmount"))}</th>
            <th>${escapeHtml(t("paidAmount"))}</th>
            <th>${escapeHtml(t("remainder"))}</th>
            <th>${escapeHtml(t("statusColumn"))}</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
  `;
}

function exportPdf(type){
  const debts = getFilteredDebtsForExport(type);
  if (debts === null) return;

  if (!debts.length){
    alert(t("exportNoData"));
    return;
  }

  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "0";
  wrapper.style.top = "0";
  wrapper.style.width = "1400px";
  wrapper.style.background = "#fff";
  wrapper.style.zIndex = "9999";
  wrapper.style.opacity = "0.01";
  wrapper.style.pointerEvents = "none";

  wrapper.innerHTML = buildPdfHtml(type, debts);
  document.body.appendChild(wrapper);

  const reportElement = wrapper.querySelector("#pdfReportTemp");

  setTimeout(() => {
    html2pdf()
      .set({
        margin: 8,
        filename: getPdfFileName(type),
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff"
        },
        jsPDF: {
          unit: "mm",
          format: "a4",
          orientation: "landscape"
        }
      })
      .from(reportElement)
      .save()
      .then(() => {
        wrapper.remove();
        closeExportMenu();
      })
      .catch((err) => {
        console.error("PDF export error:", err);
        wrapper.remove();
      });
  }, 150);
}
