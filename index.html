<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.header {background:#000;color:white;padding:15px;text-align:center;font-weight:600;}
.container {padding:15px;max-width:500px;margin:auto;}

.stats-card {
  background:white;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

.stat-line {
  display:flex;
  align-items:flex-start;
  margin-bottom:14px;
  font-size:14px;
}

.stat-icon {font-size:20px;margin-right:10px;}
.stat-bold {font-weight:600;}

.overdue-card {
  background:#ffe6e6;
  color:#b00000;
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
  font-weight:600;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
}

.card {
  background:white;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  transition: all 0.35s ease;
}

.slide-out {
  opacity:0;
  transform: translateX(-100%) translateY(-10px);
  height:0;
  margin:0;
  padding-top:0;
  padding-bottom:0;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#28a745;
  color:white;
  margin-top:8px;
  font-weight:600;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

button:active {
  transform: scale(0.96);
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

button:disabled {opacity:0.5;}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

.login {
  position:fixed;
  inset:0;
  background:#000;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#globalLoader {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
  color:white;
  font-weight:600;
  font-size:16px;
}

#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#28a745;
  color:white;
  padding:10px 20px;
  border-radius:8px;
  display:none;
  font-size:14px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login">
  <h2>Вход в систему</h2>
  <input type="password" id="pinInput" placeholder="Введите PIN">
  <button onclick="login()">Войти</button>
</div>

<div class="header">
  Fashion&StyleLife - Долги
  <div id="versionBox"></div>
</div>

<div class="container">
<div id="summaryBox"></div>
<div id="overdueBox"></div>

<h3>Добавить долг</h3>

<input type="text" id="client" placeholder="Имя клиента">
<input type="text" id="phone" maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
placeholder="Телефон (9 цифр)">
<input type="number" id="amount"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
placeholder="Сумма">
<label>Выберите дату возврата</label>
<input type="date" id="dueDate">
<button id="saveBtn" disabled onclick="addDebt()">Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>
</div>

<div id="globalLoader">⏳ Обработка...</div>
<div id="toast"></div>

<audio id="successSound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-cash-register-purchase-873.mp3" type="audio/mpeg">
</audio>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygSj1FHcHUQPmNfndfYv_qhbAsSvaacl65quErOVKDKuaepPc7mkrGbmIW5GpwqJjD-Q/exec";

const USERS = {"1111":"Умед","2222":"Фарзона","3333":"Шахром"};

function login(){
  const pin=pinInput.value;
  if(USERS[pin]){
    localStorage.setItem("seller",USERS[pin]);
    loginScreen.style.display="none";
    loadDebts();
  }else alert("Неверный PIN");
}

if(localStorage.getItem("seller")){
  loginScreen.style.display="none";
  loadDebts();
}

const client=document.getElementById("client");
const phone=document.getElementById("phone");
const amount=document.getElementById("amount");
const dueDate=document.getElementById("dueDate");
const saveBtn=document.getElementById("saveBtn");

[client,phone,amount,dueDate].forEach(el=>{
  el.addEventListener("input",()=>{
    saveBtn.disabled=!(client.value && phone.value.length===9 && amount.value && dueDate.value);
  });
});

function showLoader(text="Обработка..."){
  globalLoader.innerHTML="⏳ "+text;
  globalLoader.style.display="flex";
}
function hideLoader(){globalLoader.style.display="none";}
function showToast(message,color="#28a745"){
  toast.innerText=message;
  toast.style.background=color;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",2000);
}

function animateNumber(el,start,end,duration=600){
  let startTime=null;
  function animation(currentTime){
    if(!startTime) startTime=currentTime;
    const progress=Math.min((currentTime-startTime)/duration,1);
    el.innerText=Math.floor(progress*(end-start)+start);
    if(progress<1) requestAnimationFrame(animation);
  }
  requestAnimationFrame(animation);
}

function loadDebts(){
  fetch(SCRIPT_URL).then(res=>res.json()).then(data=>{
    versionBox.innerText="v"+data.version;

    summaryBox.innerHTML=`
      <div class="stats-card">
        <div class="stat-line">
          <span class="stat-icon">💰</span>
          <div>
            <span class="stat-bold">Всего долгов на сумму:</span>
            <span id="allTotal"></span> сомони<br>
            Общее количество должников: <span id="allCount"></span>
          </div>
        </div>
        <div class="stat-line">
          <span class="stat-icon">🟢</span>
          <div>
            <span class="stat-bold">Активные:</span>
            <span id="activeTotal"></span> сомони
            (<span id="activeCount"></span>)
          </div>
        </div>
        <div class="stat-line">
          <span class="stat-icon">🔵</span>
          <div>
            <span class="stat-bold">Оплаченные:</span>
            <span id="paidTotal"></span> сомони
            (<span id="paidCount"></span>)
          </div>
        </div>
      </div>
    `;

    overdueBox.innerHTML=`
      <div class="overdue-card">
        🔴 Просроченные: ${data.overdueCount}
        на сумму ${data.overdueTotal} сомони
      </div>
    `;

    animateNumber(allTotal,0,data.allTotal);
    animateNumber(allCount,0,data.activeCount+data.paidCount);
    animateNumber(activeTotal,0,data.activeTotal);
    animateNumber(activeCount,0,data.activeCount);
    animateNumber(paidTotal,0,data.paidTotal);
    animateNumber(paidCount,0,data.paidCount);

    let html="";
    data.debts.forEach(d=>{
      html+=`
      <div class="card" id="debt-${d.row}" style="${d.overdue?'border-left:5px solid red':''}">
        <b>${d.client}</b><br>
        Телефон: ${d.phone}<br>
        Сумма: ${d.amount} сомони<br>
        <button onclick="markPaid(${d.row})">Оплачено</button>
      </div>`;
    });
    debtList.innerHTML=html;
  });
}

function addDebt(){
  showLoader("Отправляются данные...");
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      client:client.value,
      phone:phone.value,
      amount:amount.value,
      dueDate:dueDate.value,
      seller:localStorage.getItem("seller")
    })
  }).then(()=>{
    client.value="";
    phone.value="";
    amount.value="";
    dueDate.value="";
    saveBtn.disabled=true;
    hideLoader();
    showToast("✅ Долг добавлен");
    loadDebts();
  });
}

function markPaid(row){
  if(!confirm("Подтвердить оплату?")) return;

  const seller=localStorage.getItem("seller");
  const card=document.getElementById("debt-"+row);
  const button=card.querySelector("button");

  button.disabled=true;
  button.innerText="⏳ Обработка...";

  fetch(SCRIPT_URL+"?paid="+row+"&seller="+seller)
  .then(()=>{
    document.getElementById("successSound").play();
    showToast("💸 Долг оплачен");
    card.classList.add("slide-out");
    setTimeout(()=>{
      card.remove();
      loadDebts();
    },350);
  });
}
</script>
</body>
</html>
