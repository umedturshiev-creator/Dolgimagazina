<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
-webkit-text-size-adjust:100%;
}

.header{
background:#000;
color:white;
text-align:center;
padding:18px 10px;
}

.container{
max-width:100%;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
font-size:16px;
}

.red{
border-left:6px solid red;
background:#ffecec;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#28a745;
color:white;
margin-top:10px;
font-weight:bold;
font-size:16px;
transition:0.2s;
}

button:disabled{opacity:0.6;}
button:active{transform:scale(0.97);}

input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:18px;
height:50px;
box-sizing:border-box;
}

.login{
position:fixed;
inset:0;
background:#000;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
text-align:center;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:16px;
width:90%;
max-width:350px;
position:relative;
}

.close-btn{
position:absolute;
right:12px;
top:10px;
cursor:pointer;
font-size:20px;
}
</style>
</head>

<body>

<div id="loginScreen" class="login">
<h2>Вход</h2>
<input type="tel" inputmode="numeric" pattern="[0-9]*" id="pinInput" placeholder="Введите PIN">
<button onclick="login()">Войти</button>
</div>

<div class="header">
<h2>Fashion&StyleLife - Долги</h2>
<div id="sellerName"></div>
</div>

<div class="container" id="appContent" style="display:none;">

<div id="statsBox"></div>

<h3>Добавить долг</h3>
<input id="client" placeholder="Имя клиента">
<input id="phone" placeholder="Телефон (9 цифр)" maxlength="9"
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
<input id="amount" type="number" placeholder="Сумма">
<label style="font-size:14px;">Выберите дату оплаты</label>
<input id="dueDate" type="date">
<button id="saveBtn" onclick="addDebt()" disabled>Сохранить</button>

<h3>Список должников</h3>
<div id="debtList"></div>

</div>

<div class="modal" id="paymentModal">
<div class="modal-content">
<div class="close-btn" onclick="closeModal()">✖</div>
<h3>Введите сумму оплаты</h3>
<input type="number" id="partialAmount">
<button id="confirmBtn" onclick="confirmPayment()">Подтвердить</button>
</div>
</div>

<script>

const VERSION="11.0";
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxhtHEObrEOpemPBRYFvX7NuUvtUUkmQVbKUl5gfanFIyIMVy5j0BEA5uW70fb1l7OYOA/exec";

const USERS={
"0000":"Тахмина",
"5301":"Гульчехра",
"1602":"Махфират",
"1111":"Умед"
};

let currentSeller=null;
let currentRow=null;
let currentRemainder=0;

function login(){
let pin=pinInput.value.trim();
if(!USERS[pin]){alert("Неверный пароль");return;}
currentSeller=USERS[pin];
sessionStorage.setItem("seller",currentSeller);
openApp();
}

function openApp(){
loginScreen.style.display="none";
appContent.style.display="block";
sellerName.innerHTML="👤 Вошёл: <b>"+currentSeller+"</b><br>Версия: v"+VERSION;
loadDebts();
checkUpdate();
}

window.onload=function(){
let saved=sessionStorage.getItem("seller");
if(saved){currentSeller=saved;openApp();}
};

function checkUpdate(){
fetch(SCRIPT_URL + "?version=1")
.then(res=>res.json())
.then(data=>{
if(data.version && data.version !== VERSION){
location.reload(true);
}
})
.catch(()=>{});
}

function loadDebts(){
fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

statsBox.innerHTML=`
<div class="card">
<div style="cursor:pointer;font-weight:bold;" onclick="toggleStats()">
📊 Статистика (нажмите для раскрытия)
</div>
<div id="statsContent" style="display:none;margin-top:10px;">
💰 <b>Всего долгов:</b> ${data.allTotal} сомони (${data.activeCount + data.paidCount} должников)<br><br>
🟢 Активные долги: ${data.activeTotal} сомони (${data.activeCount} должника)<br>
🔵 Оплаченные долги: ${data.paidTotal} сомони (${data.paidCount} должника)<br>
<div class="red">
🔴 Просроченные долги: ${data.overdueTotal} сомони (${data.overdueCount} должника)
</div>
</div>
</div>
`;

let html="";

data.debts.reverse().forEach(d=>{

let overdueClass = d.isOverdue ? "red" : "";

html+=`
<div class="card ${overdueClass}">
<b>${d.client}</b><br>
Телефон: ${d.phone}<br>
Всего: ${d.total} сомони<br>
Остаток: <b>${d.remainder}</b> сомони
<button onclick="openPayment(${d.row},${d.remainder})">
Оплатить
</button>
</div>`;
});

debtList.innerHTML=html;
});
}

function toggleStats(){
let el=document.getElementById("statsContent");
el.style.display=el.style.display==="none"?"block":"none";
}

function addDebt(){
if(!client.value || phone.value.length!==9 || !amount.value || !dueDate.value){return;}
saveBtn.disabled=true;
saveBtn.innerText="⏳ Сохранение...";

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
client:client.value,
phone:phone.value,
amount:amount.value,
dueDate:dueDate.value,
seller:currentSeller
})
})
.then(()=>{location.reload();});
}

function openPayment(row,remainder){
currentRow=row;
currentRemainder=remainder;
partialAmount.value="";
paymentModal.style.display="flex";
}

function closeModal(){
paymentModal.style.display="none";
}

function confirmPayment(){
let pay=Number(partialAmount.value);
if(pay<=0 || pay>currentRemainder){alert("Неверная сумма");return;}

confirmBtn.disabled=true;
confirmBtn.innerText="⏳ Обработка...";

fetch(SCRIPT_URL+"?paid="+currentRow+
"&seller="+currentSeller+
"&amount="+pay)
.then(()=>{location.reload();});
}

function checkForm(){
if(client.value && phone.value.length===9 && amount.value && dueDate.value){
saveBtn.disabled=false;
}else{
saveBtn.disabled=true;
}
}

client.addEventListener("input",checkForm);
phone.addEventListener("input",checkForm);
amount.addEventListener("input",checkForm);
dueDate.addEventListener("input",checkForm);

</script>

</body>
</html>
