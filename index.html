<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion&StyleLife - Долги</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

.header {
  background:#000;
  color:white;
  padding:15px;
  text-align:center;
}

.logo {
  width:120px;
  margin-bottom:5px;
}

.version {
  font-size:12px;
  opacity:0.7;
}

.container {
  padding:15px;
  max-width:500px;
  margin:auto;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.total {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  font-weight:bold;
  text-align:center;
}

.overdue {
  background:#ffe6e6;
  color:#c40000;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
  font-weight:bold;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#28a745;
  color:white;
  margin-top:8px;
}

button:disabled {
  opacity:0.6;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

.loader {
  display:none;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="LOGO_URL_СЮДА" class="logo">
  <div>Fashion&StyleLife - Долги</div>
  <div class="version" id="versionBox">v3.0</div>
</div>

<div class="container">

<div class="total" id="totalBox">Загрузка...</div>
<div class="overdue" id="overdueBox"></div>

<h3>Добавить долг</h3>

<input type="text" id="client" placeholder="Имя клиента">

<input type="text" id="phone" placeholder="Телефон (9 цифр)"
pattern="[0-9]{9}" maxlength="9"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input type="number" id="amount" placeholder="Сумма"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input type="date" id="dueDate">

<button id="saveBtn" onclick="addDebt()">Сохранить</button>
<div class="loader" id="saveLoader">⏳ Сохранение...</div>

<h3>Список должников</h3>

<div id="debtList"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyh9jFwWsAqtVVauHS0l_rCy6hzOR5a834GvccRzrJxvIne2vPQ-5eV4IsUsIhOYU566Q/exec";

function loadDebts() {

  fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {

    document.getElementById("versionBox").innerText = "v" + data.version;
    document.getElementById("totalBox").innerHTML =
      "Общая сумма: " + data.total + " сомони";

    document.getElementById("overdueBox").innerHTML =
      "Просрочено: " + data.overdue;

    let html = "";

    data.debts.forEach(d => {

      html += `
      <div class="card" style="${d.overdue ? 'border-left:5px solid red' : ''}">
        <b>${d.client}</b><br>
        Телефон: ${d.phone}<br>
        Сумма: ${d.amount} сомони<br>
        <button onclick="markPaid(${d.row}, this)">Оплачено</button>
      </div>
      `;
    });

    document.getElementById("debtList").innerHTML = html;
  });
}

function addDebt() {

  let phone = document.getElementById("phone").value;

  if (phone.length !== 9) {
    alert("Номер телефона должен содержать ровно 9 цифр");
    return;
  }

  document.getElementById("saveBtn").disabled = true;
  document.getElementById("saveLoader").style.display = "block";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      client: client.value,
      phone: phone,
      amount: amount.value,
      dueDate: dueDate.value
    })
  })
  .then(() => {
    loadDebts();
    client.value = "";
    phone.value = "";
    amount.value = "";
    dueDate.value = "";
    document.getElementById("saveLoader").style.display = "none";
    document.getElementById("saveBtn").disabled = false;
  });
}

function markPaid(row, btn) {

  btn.disabled = true;
  btn.innerText = "⏳ Обработка...";

  fetch(SCRIPT_URL + "?paid=" + row)
  .then(() => loadDebts());
}

loadDebts();

</script>

</body>
</html>
