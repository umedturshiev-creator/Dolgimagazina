.lang-switch{

.mini-refresh-btn{

}

.container{padding:12px;}

.card{
background:white;
padding:14px;
border-radius:14px;
margin-bottom:12px;

}

.overdue{
background:#ffe5e5;

}

.warning{
background:#fff8e1;

}

button{
width:100%;
padding:10px;

border-radius:10px;
margin-top:6px;
font-weight:bold;

.save-btn:disabled{opacity:0.5;}
.pay-btn{background:#28a745;color:white;}

#fullCloseBtn{
  background:#dc2626;
  color:white;
  transition:all 0.1s ease;
}

#fullCloseBtn:active{
  transform:scale(0.97);
}

.action-row{display:flex;gap:6px;margin-top:6px;}
.action-row a{
flex:1;
text-align:center;
padding:8px;
border-radius:8px;
font-size:13px;
text-decoration:none;
color:white;
}
.call-btn{background:#007bff;}
.wa-btn{background:#25D366;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

.search-box{
background:white;
padding:10px;
border-radius:12px;
margin-bottom:12px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);

align-items:center;
justify-content:center;

}

.modal-content{

padding:20px;
border-radius:14px;
width:90%;

text-align:left;
max-height:80vh;
overflow:auto;
}

.loader{
animation:pulse 1s infinite;
text-align:center;
font-weight:bold;
margin-top:10px;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}

<div class="modal" id="logoutModal">
  <div class="modal-content" style="text-align:center;">
    <h3>Подтверждение выхода</h3>
    <p>Вы действительно хотите выйти?</p>

    <button onclick="confirmLogout()" style="background:#dc3545;color:white;">
      Выйти
    </button>

    <button onclick="closeLogout()" style="background:#ccc;color:black;">
      Отмена
    </button>
  </div>
</div>

<div id="loginScreen" class="login">
  <img src="logo.png">
  <h2>Вход</h2>
  <input type="tel" inputmode="numeric" id="pinInput" placeholder="Введите PIN">
  <button onclick="login()">Войти</button>
</div>

<div class="header" id="mainHeader" style="display:none;">
<div class="header-left">
  <div class="lang-switch compact-lang">
    <button class="lang-btn active" data-lang="ru" onclick="setLanguage('ru')">RU</button>
    <button class="lang-btn" data-lang="tj" onclick="setLanguage('tj')">TJ</button>
  </div>
</div>

<div class="header-center">
  <h2>Fashion&StyleLife - Долги</h2>
  <div class="user-meta">
    <div id="userInfo"></div>
    <button id="refreshBtn" class="mini-refresh-btn" onclick="forceAppUpdate()">
  Обновить
</button>
  </div>
</div>

<div class="header-right">
  <button class="export-btn" onclick="openExportMenu()">PDF</button>
  <button class="logout-btn" onclick="logout()">🚪</button>
</div>
</div>

<div class="container" id="appContent" style="display:none;">
  <div id="statsBox"></div>

  <h3>Добавить долг</h3>
  <input id="client" placeholder="Имя клиента">
  <input id="phone" placeholder="Телефон" maxlength="9" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
  <input id="amount" type="tel" inputmode="numeric" placeholder="Сумма">
  <label style="color:red;font-weight:bold;">Выберите дату оплаты</label>
  <input id="dueDate" type="date">
  <button id="saveBtn" class="save-btn" disabled onclick="addDebt()">Сохранить</button>
  <div id="saveLoader" class="loader" style="display:none;">⏳ Сохранение...</div>

  <div class="search-box">
    <input id="searchInput" placeholder="🔍 Поиск по имени или номеру">
  </div>

  <h3>Список должников</h3>
  <div id="debtList"></div>
</div>

<div class="modal" id="paymentModal">
  <div class="modal-content">
    <h3>Оплата долга</h3>
    <div id="paymentInfo"></div>
    <input type="tel" inputmode="numeric" id="paymentAmount" placeholder="Введите сумму">
    <button class="pay-btn" onclick="confirmPayment()">Подтвердить оплату</button>
    <button id="fullCloseBtn" onclick="openFullCloseConfirm()" style="background:#dc2626;color:white;">
      Погасить полностью
    </button>
    <button id="fullCloseCancelBtn" onclick="closeFullCloseModal()" style="background:#ccc;color:black;">
  Отмена
</button>
    <div id="paymentLoader" class="loader" style="display:none;">⏳ Обработка...</div>
  </div>
</div>

<div class="modal" id="historyModal">
  <div class="modal-content">
    <h3>История оплат</h3>
    <div id="historyLoader" class="loader" style="display:none;">⏳ Загрузка истории...</div>
    <div id="historyContent"></div>
    <button onclick="closeHistory()">Закрыть</button>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content">
    <h3 id="exportTitle">Экспорт</h3>

    <button id="exportAllBtn" onclick="exportPdf('all')" style="background:#1f3b8f;color:white;">
      Экспорт всех данных
    </button>

    <div style="margin-top:10px;">
      <label id="exportMonthLabel" style="font-weight:bold;">Выберите месяц</label>
      <input type="month" id="exportMonth">
    </div>

    <button id="exportMonthBtn" onclick="exportPdf('month')" style="background:#0ea5e9;color:white;">
      Экспорт за месяц
    </button>

    <button id="exportOverdueBtn" onclick="exportPdf('overdue')" style="background:#dc2626;color:white;">
      Экспорт только просроченных
    </button>

    <button id="exportCancelBtn" onclick="closeExportMenu()" style="background:#ccc;color:black;">
      Отмена
    </button>
  </div>
</div>

<div class="modal" id="mergeDebtModal">
  <div class="modal-content merge-modal">
    <h3 id="mergeDebtTitle">Найден существующий долг</h3>
    <div class="merge-info" id="mergeDebtInfo"></div>

    <div class="merge-actions">
      <button id="mergeAppendBtn" class="merge-btn append-btn">Записать в существующий</button>
      <button id="mergeCreateBtn" class="merge-btn create-btn">Создать новую запись</button>
      <button id="mergeCancelBtn" class="merge-btn cancel-btn">Отмена</button>
    </div>
  </div>
</div>
  
<div class="modal" id="fullCloseConfirmModal">
  <div class="modal-content">
    <h3 id="fullCloseTitle">Полное погашение</h3>
    <div id="fullCloseText"></div>

    <button id="fullCloseYesBtn" class="pay-btn">
      Да, погасить
    </button>

    <button onclick="closeFullCloseModal()" style="background:#ccc;color:black;">
      Отмена
    </button>
  </div>
</div>
  

<div id="toast" class="toast"></div>

function t(key, vars = {}) {
  let text = translations[currentLanguage]?.[key] || translations.ru[key] || key;
  Object.keys(vars).forEach(k => {
    text = text.replaceAll(`{${k}}`, vars[k]);
  });
  return text;
}

function showToast(message, type = "success"){
  const toast = document.getElementById("toast");
  if (!toast) return;

  toast.className = "toast";
  toast.classList.add(type);
  toast.innerHTML = message;

  clearTimeout(toastTimer);

  requestAnimationFrame(() => {
    toast.classList.add("show");
  });

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 2600);
}

function askDebtSaveMode(existingDebt, newDebt){
  return new Promise((resolve) => {
    mergeDebtResolver = resolve;

    const modal = document.getElementById("mergeDebtModal");
    const info = document.getElementById("mergeDebtInfo");
    const appendBtn = document.getElementById("mergeAppendBtn");
    const createBtn = document.getElementById("mergeCreateBtn");
    const cancelBtn = document.getElementById("mergeCancelBtn");

    const clientName = existingDebt.client || "-";
    const phone = newDebt.phone || existingDebt.phone || "-";
    const currentRemainder = Number(existingDebt.remainder || 0);
    const newAmount = Number(newDebt.amount || 0);

    info.innerHTML = `
      <div>${t("mergeDebtText")}</div>
      <div style="margin-top:10px;"><b>${t("mergeClient")}:</b> ${clientName}</div>
      <div><b>${t("mergePhone")}:</b> ${phone}</div>
      <div><b>${t("mergeCurrentRemainder")}:</b> ${currentRemainder} ${t("somoni")}</div>
      <div><b>${t("mergeNewAmount")}:</b> ${newAmount} ${t("somoni")}</div>
    `;

    modal.style.display = "flex";

    appendBtn.onclick = function () {
      closeMergeDebtModal("append");
    };

    createBtn.onclick = function () {
      closeMergeDebtModal("new");
    };

    cancelBtn.onclick = function () {
      closeMergeDebtModal("cancel");
    };
  });
}

function closeMergeDebtModal(result){
  const modal = document.getElementById("mergeDebtModal");
  const appendBtn = document.getElementById("mergeAppendBtn");
  const createBtn = document.getElementById("mergeCreateBtn");
  const cancelBtn = document.getElementById("mergeCancelBtn");

  modal.style.display = "none";
  appendBtn.onclick = null;
  createBtn.onclick = null;
  cancelBtn.onclick = null;

  if (mergeDebtResolver) {
    mergeDebtResolver(result);
    mergeDebtResolver = null;
  }
}

function parseSumHistory(notification){
  if (!notification) return [];

  return String(notification)
    .split(/\n|\|/)
    .map(item => item.trim())
    .filter(item => item && item.toLowerCase().includes("суммирован"));
}

function renderSumHistory(notification){
  const items = parseSumHistory(notification);
  if (!items.length) return "";

  const historyHtml = items.map(item => {
    return `<div class="sum-history-item">• ${item}</div>`;
  }).join("");

  return `
    <div class="sum-history-box">
      <div class="sum-history-title">➕ ${t("sumHistoryTitle")}</div>
      ${historyHtml}
    </div>
  `;
}

function validateForm(){

}

async function addDebt(){
  if (saveBtn.disabled) return;

  const clientName = client.value.trim();
  const phoneValue = phone.value.trim();
  const amountValue = Number(amount.value || 0);
  const dueDateValue = dueDate.value;

  if (!clientName || !phoneValue || !amountValue || !dueDateValue) return;

  const normalizedPhone = phoneValue.replace(/\D/g, "");

  const existingDebt = allDebts.find(d => {
    const debtPhone = String(d.phone || "").replace(/\D/g, "");
    return debtPhone === normalizedPhone && Number(d.remainder || 0) > 0;
  });

  let payload = {
    client: clientName,
    phone: phoneValue,
    amount: amountValue,
    dueDate: dueDateValue,
    seller: currentSeller
  };

  if (existingDebt) {
    const action = await askDebtSaveMode(existingDebt, payload);

    if (action === "cancel") {
      showToast(`ℹ️ ${t("cancelActionToast")}`, "error");
      return;
    }

    if (action === "append") {
      const now = new Date();
      const formattedDate =
        String(now.getDate()).padStart(2, "0") + "." +
        String(now.getMonth() + 1).padStart(2, "0") + "." +
        now.getFullYear() + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0");

      payload.mode = "append";
      payload.targetRow = existingDebt.row;
      payload.noteText = `Долг суммирован: +${amountValue} (${formattedDate})`;
    }
  }

  saveLoader.style.display="block";
  saveBtn.disabled=true;

  try {
    const response = await fetch(SCRIPT_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const result = await response.json();

    saveLoader.style.display="none";
    client.value="";
    phone.value="";
    amount.value="";
    dueDate.value="";
    saveBtn.disabled=true;

    if (result.success) {
      if (payload.mode === "append") {
        showToast(
          `✅ <b>${t("appendSuccessToast")}</b><br>👤 ${clientName}<br>💰 +${amountValue} ${t("somoni")}`,
          "append"
        );
      } else {
        showToast(`✅ <b>${t("newDebtSuccessToast")}</b>`, "success");
      }

      loadDebts();
    } else {
      showToast(`❌ ${t("errorSaveToast")}`, "error");
    }
  } catch(e) {
    saveLoader.style.display="none";
    saveBtn.disabled=false;
    showToast(`❌ ${t("errorSaveToast")}`, "error");
  }
}

/* ---------- ОТРИСОВКА ---------- */

function renderDebts(list){
  list.sort((a,b)=>{
    if(a.isOverdue && !b.isOverdue) return -1;
    if(!a.isOverdue && b.isOverdue) return 1;
    return new Date(a.dueDate||0) - new Date(b.dueDate||0);
  });

  let html = "";
  let today = new Date();
  today.setHours(0,0,0,0);

  list.forEach(d=>{
    let due = new Date(d.dueDate);
    due.setHours(0,0,0,0);
    let diffDays = Math.ceil((due-today)/(1000*60*60*24));

    let cardClass = "card";
    let extra = "";

    if(d.isOverdue || diffDays < 0){
      cardClass += " overdue";
      extra = `<div style="color:red;font-weight:bold;">${t("overdueDays",{days:Math.abs(diffDays)})}</div>`;
    } else if(diffDays <= 2){
      cardClass += " warning";
      extra = `<div style="color:orange;">${t("leftDays",{days:diffDays})}</div>`;
    }

    let waText = encodeURIComponent(t("waReminder", { amount: d.remainder }));
    let phoneFull = "992" + d.phone;
    let sumHistoryHtml = renderSumHistory(d.notification);

    html += `
    <div class="${cardClass}">
      <b>${d.client}</b> (${t("dueDateText",{date:d.dueDate})})<br>
      ${t("phonePlaceholder")}: ${d.phone}<br>
      ${t("debtAmount")}: ${d.total} ${t("somoni")}<br>
      ${t("paidAmount")}: ${d.paid || 0} ${t("somoni")}<br>
      ${t("lastPayment")}: ${d.partialPayment || 0} ${t("somoni")}<br>
      ${t("remainder")}: <b>${d.remainder}</b> ${t("somoni")}<br>
      ${d.isPartial ? `<div style="color:#28a745;font-weight:bold;">${t("hasPayment")}</div>` : ""}
      ${sumHistoryHtml}
      ${extra}

      <button class="pay-btn" onclick="openPayment(${d.row},${d.remainder})">
        ${t("payBtn")}
      </button>

      <div class="action-row">
        <a class="call-btn" href="tel:+${phoneFull}">📞 ${t("callBtn")}</a>
        <a class="wa-btn" target="_blank" href="https://wa.me/${phoneFull}?text=${waText}">
          💬 ${t("whatsappBtn")}
        </a>
      </div>

      <button onclick="showHistory('${String(d.client).replace(/'/g,"\\'")}')">
        📂 ${t("historyBtn")}
      </button>
    </div>
    `;
  });

  debtList.innerHTML = html || `<div class="card">${t("noData")}</div>`;
}

function applySearch(){
  let val = searchInput.value.toLowerCase().trim();

  if(val === ""){
    renderDebts([...allDebts]);
    return;
  }

  let filtered = allDebts.filter(d => {
    let nameMatch = d.client && d.client.toLowerCase().includes(val);
    let phoneMatch = d.phone && d.phone.toString().includes(val);
    return nameMatch || phoneMatch;
  });

  renderDebts(filtered);
}

    .catch(err => {
      console.error(err);
      paymentLoader.style.display = "none";
      showToast(`❌ ${t("errorSaveToast")}`, "error");
    });
}  

/* ---------- ИСТОРИЯ ---------- */

function showHistory(name){
  historyModal.style.display = "flex";
  historyContent.innerHTML = "";
  historyLoader.style.display = "block";

  fetch(SCRIPT_URL+"?history="+encodeURIComponent(name))
  .then(res=>res.json())
  .then(data=>{
    historyLoader.style.display = "none";
    let html = "";
    if(data.history && data.history.length>0){
      data.history.forEach(h=>{
        html += `📅 ${h.date}<br>💰 ${h.amount} ${t("somoni")}<br>👤 ${h.seller}<hr>`;
      });
    } else {
      html = t("noPayments");
    }
    historyContent.innerHTML = html;
  });
}

function closeHistory(){
  historyModal.style.display = "none";
}

function openExportMenu(){
  exportModal.style.display = "flex";
}

function closeExportMenu(){
  exportModal.style.display = "none";
}

function formatReportDate(dateStr){
  if(!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return new Intl.DateTimeFormat(currentLanguage === "tj" ? "tg-TJ" : "ru-RU").format(d);
}

function getTodayFormatted(){
  return new Intl.DateTimeFormat(currentLanguage === "tj" ? "tg-TJ" : "ru-RU", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  }).format(new Date());
}

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getDebtStatusKey(d){
  const remainder = Number(d.remainder || 0);
  const paid = Number(d.paid || 0);

  if (remainder <= 0) return "statusClosed";
  if (d.isOverdue) return "statusOverdue";
  if (d.isPartial || paid > 0) return "statusPartial";
  return "statusActive";
}

function getDebtStatusClass(statusKey){
  if (statusKey === "statusOverdue") return "pdf-status-overdue";
  if (statusKey === "statusPartial") return "pdf-status-partial";
  if (statusKey === "statusClosed") return "pdf-status-closed";
  return "pdf-status-active";
}

function getFilteredDebtsForExport(type){
  let list = [...allDebts];

  if(type === "overdue"){
    list = list.filter(d => getDebtStatusKey(d) === "statusOverdue");
  }

  if(type === "month"){
    const selectedMonth = document.getElementById("exportMonth").value;
    if(!selectedMonth){
      alert(t("exportNoMonth"));
      return null;
    }

    list = list.filter(d => (d.dueDate || "").startsWith(selectedMonth));
  }

  return list;
}

function getReportTitle(type){
  if(type === "month"){
    const selectedMonth = document.getElementById("exportMonth").value || "";
    return t("reportTitleMonth", { month: selectedMonth });
  }
  if(type === "overdue") return t("reportTitleOverdue");
  return t("reportTitleAll");
}

function getPdfFileName(type){
  if(type === "month") return `${t("pdfFileMonth")}.pdf`;
  if(type === "overdue") return `${t("pdfFileOverdue")}.pdf`;
  return `${t("pdfFileAll")}.pdf`;
}

function buildPdfHtml(type, debts){
  const rows = debts.map((d, index) => {
    const statusKey = getDebtStatusKey(d);

    return `
      <tr>
        <td>${index + 1}</td>
        <td>${escapeHtml(d.client || "")}</td>
        <td>${escapeHtml(d.phone || "")}</td>
        <td>${escapeHtml(formatReportDate(d.dueDate || ""))}</td>
        <td>${escapeHtml(d.total || 0)} ${escapeHtml(t("somoni"))}</td>
        <td>${escapeHtml(d.paid || 0)} ${escapeHtml(t("somoni"))}</td>
        <td>${escapeHtml(d.remainder || 0)} ${escapeHtml(t("somoni"))}</td>
        <td class="${getDebtStatusClass(statusKey)}">${escapeHtml(t(statusKey))}</td>
      </tr>
    `;
  }).join("");

  return `
    <div class="pdf-report" id="pdfReportTemp">
      <h1>${escapeHtml(getReportTitle(type))}</h1>

      <div class="pdf-meta">
        <div><b>${escapeHtml(t("reportDate"))}:</b> ${escapeHtml(getTodayFormatted())}</div>
        <div><b>${escapeHtml(t("reportSeller"))}:</b> ${escapeHtml(currentSeller || "-")}</div>
        <div><b>${escapeHtml(t("reportLanguage"))}:</b> ${escapeHtml(currentLanguage.toUpperCase())}</div>
      </div>

      <table class="pdf-table">
        <thead>
          <tr>
            <th>№</th>
            <th>${escapeHtml(t("clientPlaceholder"))}</th>
            <th>${escapeHtml(t("phonePlaceholder"))}</th>
            <th>${escapeHtml(t("choosePayDate"))}</th>
            <th>${escapeHtml(t("debtAmount"))}</th>
            <th>${escapeHtml(t("paidAmount"))}</th>
            <th>${escapeHtml(t("remainder"))}</th>
            <th>${escapeHtml(t("statusColumn"))}</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
  `;
}

function exportPdf(type){
  const debts = getFilteredDebtsForExport(type);
  if (debts === null) return;

  if (!debts.length){
    alert(t("exportNoData"));
    return;
  }

  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "0";
  wrapper.style.top = "0";
  wrapper.style.width = "1120px";
  wrapper.style.background = "#fff";
  wrapper.style.zIndex = "9999";
  wrapper.style.opacity = "0.01";
  wrapper.style.pointerEvents = "none";

  wrapper.innerHTML = buildPdfHtml(type, debts);
  document.body.appendChild(wrapper);

  const reportElement = wrapper.querySelector("#pdfReportTemp");

  setTimeout(() => {
    html2pdf()
      .set({
        margin: [6, 6, 6, 6],
        filename: getPdfFileName(type),
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          backgroundColor: "#ffffff"
        },
        jsPDF: {
          unit: "mm",
          format: "a4",
          orientation: "landscape"
        },
        pagebreak: {
          mode: ["css", "legacy"]
        }
      })
      .from(reportElement)
      .save()
      .then(() => {
        wrapper.remove();
        closeExportMenu();
      })
      .catch((err) => {
        console.error("PDF export error:", err);
        wrapper.remove();
      });
  }, 150);
}

function closeLogout(){
  logoutModal.style.display="none";
}

function confirmLogout(){
  document.body.style.transition="0.3s";
  document.body.style.opacity="0.5";

  setTimeout(()=>{
    sessionStorage.removeItem("seller");
    location.reload();
  },300);
}

<script>
async function forceAppUpdate() {
  try {
    showToast(`🔄 ${t("updatingToast")}`, "success");

    if ("serviceWorker" in navigator) {
      const registration = await navigator.serviceWorker.getRegistration();

      if (registration) {
        await registration.update();

        if (registration.waiting) {
          registration.waiting.postMessage({ type: "SKIP_WAITING" });
        }
      }
    }

    setTimeout(() => {
      window.location.reload();
    }, 700);

  } catch (e) {
    console.error("Ошибка обновления:", e);
    showToast(`❌ ${t("updateFailedToast")}`, "error");
  }
}
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const registration = await navigator.serviceWorker.register("./sw.js");
      console.log("Service Worker зарегистрирован");

      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener("statechange", () => {
          if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
            showToast("🔄 Доступно обновление приложения", "success");
          }
        });
      });

      if (registration.waiting) {
        registration.waiting.postMessage({ type: "SKIP_WAITING" });
      }

    } catch (err) {
      console.log("Ошибка Service Worker:", err);
    }
  });

  navigator.serviceWorker.addEventListener("controllerchange", () => {
    window.location.reload();
  });
}
</script>
